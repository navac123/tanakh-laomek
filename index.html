function pkgBoxOpen(pkg){
  const col=C[pkg.ci]||C[0];
  let boxClass='pkg-box ';
  const isChild=!!pkg.parentId;
  if(isChild) boxClass+='pkg-child ';
  let style=`--pkg-bg:${col.b};--pkg-bg-subtle:${col.b}88;--pkg-border:${col.c};`;
  if(pkg.style==='fill')boxClass+='pkg-box-fill';
  else if(pkg.style==='subtle')boxClass+='pkg-box-subtle';
  else boxClass+='pkg-box-border';
  return `<div class="${boxClass}" style="${style}">
    <div style="font-size:${isChild?'11':'12'}px;font-weight:700;color:${col.c};margin-bottom:${isChild?'4':'6'}px;display:flex;align-items:center;gap:4px">${pkg.emoji||''} ${pkg.name}</div>`;
}

function mPkg(){
  const v=D().verses;
  const lines=buildLines();
  let allKeys=[];
  lines.forEach(line=>{
    if(line.isPara) return;
    line.words.forEach(item=>{allKeys.push(`${item.vi}-${item.wi}`);});
  });
  const pkgRanges=S.pkgs.map(pkg=>{
    const first=allKeys.indexOf(pkg.words[0]);
    const last=allKeys.indexOf(pkg.words[pkg.words.length-1]);
    return {pkg,first,last};
  }).filter(r=>r.first>=0&&r.last>=0);
  pkgRanges.sort((a,b)=>{
    const aIsChild=a.pkg.parentId?1:0;const bIsChild=b.pkg.parentId?1:0;
    if(aIsChild!==bIsChild) return aIsChild-bIsChild;
    return a.first-b.first;
  });
  let openPkgs=[];
  let html='<div class="text-area" style="position:relative;padding-right:48px">';
  lines.forEach((line,li)=>{
    if(line.isPara){
      const toReopen=[...openPkgs];
      while(openPkgs.length){html+=`</div>`;openPkgs.pop();}
      html+=`<div style="height:12px"></div>`;
      toReopen.forEach(pid=>{const r=pkgRanges.find(r=>r.pkg.id===pid);if(r){html+=pkgBoxOpen(r.pkg);openPkgs.push(pid);}});
      return;
    }
    const verse=v[line.words[0].vi];
    if(!verse)return;
    const lineWordKeys=line.words.map(item=>`${item.vi}-${item.wi}`);
    const lineFirst=allKeys.indexOf(lineWordKeys[0]);
    const lineLast=allKeys.indexOf(lineWordKeys[lineWordKeys.length-1]);
    for(let i=openPkgs.length-1;i>=0;i--){
      const r=pkgRanges.find(r=>r.pkg.id===openPkgs[i]);
      if(r&&r.last<lineFirst){html+=`</div>`;openPkgs.splice(i,1);}
    }
    pkgRanges.forEach(r=>{
      if(!openPkgs.includes(r.pkg.id)&&r.first>=lineFirst&&r.first<=lineLast){
        html+=pkgBoxOpen(r.pkg);openPkgs.push(r.pkg.id);
      }
    });
    const indent=S.indents[line.lineKey]||0;
    const indentPx=indent*40;
    const firstWord=line.words[0];
    let verseNum='';
    if(firstWord.wi===0){
      const vi=firstWord.vi;
      verseNum=`<span class="verse-n verse-n-click" onclick="selectVerseWords(${vi})" title="בחרי כל מילות הפסוק" style="right:-40px;top:4px">${verse.n}</span>`;
    }
    html+=`<div class="imud-line" style="padding-right:${indentPx}px;font-size:${S.fs}px;line-height:${S.lh};position:relative">`;
    html+=verseNum;
    line.words.forEach(item=>{html+=wrd(item.w,item.vi,item.wi,'pkg')+' ';});
    html+=`</div>`;
    for(let i=openPkgs.length-1;i>=0;i--){
      const r=pkgRanges.find(r=>r.pkg.id===openPkgs[i]);
      if(r&&r.last>=lineFirst&&r.last<=lineLast){html+=`</div>`;openPkgs.splice(i,1);}
    }
  });
  while(openPkgs.length){html+=`</div>`;openPkgs.pop();}
  html+='</div>';
  return html;
}

function mCanv(){
  if(!S.pkgs.length)return `<div class="canvas" style="display:flex;align-items:center;justify-content:center;min-height:400px"><div style="text-align:center;color:${cv('#8A96AA','#6A7590')}">${decoCircle(48,cv('#D9DFF2','#2A3060'))}<div style="font-size:14px;margin-top:8px">אין חבילות עדיין — חזור לשלב האריזה</div></div></div>`;
  if(S.nodes.length!==S.pkgs.length){
    S.nodes=S.pkgs.map((_,i)=>({x:60+(i%3)*240,y:50+Math.floor(i/3)*180,w:220,h:0}));
  }
  S.nodes.forEach(n=>{if(!n.w)n.w=220;});
  const vv=D().verses;
  const cmClass=S.connMode?' conn-mode':'';
  // Build children map: parentId -> [child pkg indices]
  const childrenOf={};
  S.pkgs.forEach((p,i)=>{
    if(p.parentId&&S.pkgs.some(pp=>pp.id===p.parentId)){
      if(!childrenOf[p.parentId])childrenOf[p.parentId]=[];
      childrenOf[p.parentId].push(i);
    }
  });
  const allLines=buildLines();
  function nodeContent(p,i){
    const c=C[p.ci];
    const exp=S.expandedPkgs[p.id];
    const wordSet=new Set(p.words);
    const wordData=p.words.map(k=>{const[vi,wi]=k.split('-').map(Number);const wds=vv[vi]?.t.split(/\s+/);return {k,vi,wi,w:wds?wds[wi]:''};}).filter(d=>d.w);
    const verseSet=[...new Set(p.words.map(k=>parseInt(k.split('-')[0])))];
    const verseNums=verseSet.map(vi=>vv[vi]?vv[vi].n:'').filter(Boolean);
    let txt;
    if(exp){
      // Full layout with imud + discovery
      let html='';
      allLines.forEach(line=>{
        if(line.isPara)return;
        const lineHasWord=line.words.some(item=>wordSet.has(item.k));
        if(!lineHasWord)return;
        const indent=S.indents[line.lineKey]||0;
        const indentPx=indent*20;
        const firstWord=line.words[0];
        let verseNum='';
        if(firstWord.wi===0){
          const v=vv[firstWord.vi];
          if(v)verseNum=`<span style="color:${cv('#8A96AA','#6A7590')};font-family:'Heebo';font-size:9px;margin-left:4px;user-select:none">${v.n}</span>`;
        }
        html+=`<div style="padding-right:${indentPx}px;line-height:${S.lh};position:relative;min-height:1em">`;
        html+=verseNum;
        line.words.forEach(item=>{
          if(wordSet.has(item.k)){
            html+=wrd(item.w,item.vi,item.wi,'canv')+' ';
          }else{
            html+=`<span style="opacity:.25;font-family:${fontCSS()};font-size:14px">${item.w}</span> `;
          }
        });
        html+=`</div>`;
      });
      txt=html;
    }else{
      txt=wordData.slice(0,6).map(d=>d.w).join(' ')+(wordData.length>6?' ...':'');
    }
    return {c,exp,txt,verseNums};
  }
  function renderChild(ci){
    const cp=S.pkgs[ci];const{c,exp,txt,verseNums}=nodeContent(cp,ci);
    const childStl=cp.style==='subtle'?`background:${c.b}88;border-color:${c.c};border-style:dashed`:cp.style==='border'?`background:transparent;border-color:${c.c}`:`background:${c.b};border-color:${c.c}`;
    const selClass=(S.connMode&&S.connMode.from===cp.id)?' conn-sel':'';
    return `<div class="c-child-inner${selClass}" id="nd${ci}" style="${childStl}" onclick="event.stopPropagation();nodeClick(event,${ci})">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">
        <span onclick="event.stopPropagation();tglExp('${cp.id}')" style="cursor:pointer;font-size:10px">${exp?'▾':'▸'}</span>
        <span class="c-node-t" style="color:${c.c};margin-bottom:0">${cp.emoji||''} ${cp.name}</span>
      </div>
      <div class="c-node-w${exp?'':' collapsed'}" style="font-family:${fontCSS()};${exp?'font-size:14px;line-height:'+S.lh:''}">${txt}</div>
      ${verseNums.length&&!exp?`<div style="font-size:9px;color:${c.c};opacity:.5;margin-top:2px">פס׳ ${verseNums.join(',')}</div>`:''}
      <div class="c-conn-dot" onmousedown="event.stopPropagation();startConn('${cp.id}')" title="גרור ליצירת קישור"></div>
    </div>`;
  }
  let nodesHtml=S.pkgs.map((p,i)=>{
    // Skip children — they render inside their parent
    const hasParent=p.parentId&&S.pkgs.some(pp=>pp.id===p.parentId);
    if(hasParent)return '';
    const nd=S.nodes[i];
    const{c,exp,txt,verseNums}=nodeContent(p,i);
    const selClass=(S.connMode&&S.connMode.from===p.id)?' conn-sel':'';
    const stl=p.style==='subtle'?`background:${c.b}88;border-color:${c.c};border-style:dashed`:p.style==='border'?`background:transparent;border-color:${c.c}`:`background:${c.b};border-color:${c.c}`;
    const children=childrenOf[p.id]||[];
    const nodeW=children.length?Math.max(nd.w,280):nd.w;
    let childrenHtml='';
    if(children.length){
      childrenHtml=`<div class="c-child-wrap" style="border-top:1px dashed ${c.c}40">
        <div class="c-child-label">אריזות משנה (${children.length})</div>
        ${children.map(ci=>renderChild(ci)).join('')}
      </div>`;
    }
    return `<div class="c-node${selClass}" id="nd${i}" style="left:${nd.x}px;top:${nd.y}px;width:${nodeW}px;${stl}" onmousedown="ds(event,${i})" ontouchstart="dts(event,${i})" onclick="nodeClick(event,${i})">
      <div class="c-node-tgl" onclick="event.stopPropagation();tglExp('${p.id}')">${exp?'▾':'▸'}</div>
      <div class="c-node-t" style="color:${c.c}">${p.emoji||''} ${p.name}</div>
      <div class="c-node-w${exp?'':' collapsed'}" style="font-family:${fontCSS()};${exp?'font-size:14px;line-height:'+S.lh:''}">${txt}</div>
      ${verseNums.length&&!exp?`<div style="font-size:10px;color:${c.c};opacity:.5;margin-top:3px">פס׳ ${verseNums.join(',')}</div>`:''}
      ${childrenHtml}
      <div class="c-conn-dot" onmousedown="event.stopPropagation();startConn('${p.id}')" title="גרור ליצירת קישור"></div>
      <div class="c-rsz" onmousedown="event.stopPropagation();startResize(event,${i})"></div>
    </div>`}).join('');
  let svgHtml=buildArrowsSvg();
  let arrowLabelsHtml=buildArrowLabels();
  const zScale=S.cvZoom/100;
  return `${cvToolbar()}<div class="canvas${cmClass}" id="cv" style="min-height:600px;position:relative;overflow:auto">
    <div id="cvInner" style="transform:scale(${zScale});transform-origin:top right;position:relative;min-height:${600/zScale}px;min-width:100%">
    <svg class="cv-svg" id="cvSvg">${svgHtml}</svg>
    ${nodesHtml}${arrowLabelsHtml}${renderShapes()}${renderStickies()}${renderLabels()}
    </div>${renderZoom()}${renderMinimap()}</div>`;
}

function ndRect(i){
  const el=document.getElementById('nd'+i);
  if(el){
    const x=parseInt(el.style.left)||S.nodes[i].x;
    const y=parseInt(el.style.top)||S.nodes[i].y;
    const w=el.offsetWidth||S.nodes[i].w||220;
    const h=el.offsetHeight||80;
    return {x,y,w,h};
  }

  return {x:n.x,y:n.y,w:n.w||220,h:80};
}

function edgePts(fr,tr){
  const fcx=fr.x+fr.w/2,fcy=fr.y+fr.h/2;
  const tcx=tr.x+tr.w/2,tcy=tr.y+tr.h/2;
  const dx=tcx-fcx,dy=tcy-fcy;
  let fx,fy,tx,ty,fSide,tSide;
  if(Math.abs(dy)>Math.abs(dx)*0.6){
    if(dy>0){fSide='bottom';fx=fcx;fy=fr.y+fr.h}
    else{fSide='top';fx=fcx;fy=fr.y}
  }else{
    if(dx<0){fSide='left';fx=fr.x;fy=fcy}
    else{fSide='right';fx=fr.x+fr.w;fy=fcy}
  }
  if(Math.abs(dy)>Math.abs(dx)*0.6){
    if(dy>0){tSide='top';tx=tcx;ty=tr.y}
    else{tSide='bottom';tx=tcx;ty=tr.y+tr.h}
  }else{
    if(dx<0){tSide='right';tx=tr.x+tr.w;ty=tcy}
    else{tSide='left';tx=tr.x;ty=tcy}
  }
  return {fx,fy,tx,ty,fSide,tSide};
}

function curvedPath(ep){
  const {fx,fy,tx,ty,fSide,tSide}=ep;
  const dist=Math.hypot(tx-fx,ty-fy);
  const off=Math.max(40,dist*0.35);
  let c1x=fx,c1y=fy,c2x=tx,c2y=ty;
  if(fSide==='bottom'){c1y=fy+off}else if(fSide==='top'){c1y=fy-off}
  else if(fSide==='left'){c1x=fx-off}else{c1x=fx+off}
  if(tSide==='top'){c2y=ty-off}else if(tSide==='bottom'){c2y=ty+off}
  else if(tSide==='right'){c2x=tx+off}else{c2x=tx-off}
  return `M${fx},${fy} C${c1x},${c1y} ${c2x},${c2y} ${tx},${ty}`;
}

function buildArrowsSvg(){
  let connLines=S.conns.map((cn,ci)=>{
    const fi=S.pkgs.findIndex(p=>p.id===cn.from),ti=S.pkgs.findIndex(p=>p.id===cn.to);
    if(fi<0||ti<0)return '';
    const fr=ndRect(fi),tr=ndRect(ti);
    const ep=edgePts(fr,tr);
    const d=curvedPath(ep);
    return `<path d="${d}" fill="none" stroke="${cv('#FF7F6B','#FF7F6B')}" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowhead)" onclick="editConnLabel(${ci})" style="pointer-events:stroke;cursor:pointer"/>`;
  }).join('');
  return connLines;
}

function buildArrowLabels(){
  if(!S.conns.length)return '';
  return S.conns.map((cn,ci)=>{
    const fi=S.pkgs.findIndex(p=>p.id===cn.from),ti=S.pkgs.findIndex(p=>p.id===cn.to);
    if(fi<0||ti<0)return '';
    const fr=ndRect(fi),tr=ndRect(ti);
    const ep=edgePts(fr,tr);
    const mx=(ep.fx+ep.tx)/2,my=(ep.fy+ep.ty)/2;
    const lbl=cn.emoji||cn.label?`${cn.emoji||''} ${cn.label||''}`:'';
    if(!lbl.trim())return '';
    return `<div class="c-arrow-label" style="left:${mx-20}px;top:${my-12}px" onclick="editConnLabel(${ci})">${lbl}</div>`;
  }).join('');
}

function selectWord(k){
  if(S.selWords.includes(k)){S.selWords=S.selWords.filter(x=>x!==k);}
  else{S.selWords=[k];}
  R();
}

function getPrevWordKey(k){
  const[vi,wi]=k.split('-').map(Number);
  if(wi>0) return `${vi}-${wi-1}`;
  if(vi>0){const prevWords=D().verses[vi-1].t.split(/\s+/);return `${vi-1}-${prevWords.length-1}`;}
  return null;
}

function imudAction(action){
  if(action==='break'){
    if(!S.selWords.length){toast('בחרי מילה קודם');return;}
    const k=S.selWords[0];const prevK=getPrevWordKey(k);
    if(!prevK){toast('זו המילה הראשונה');S.selWords=[];R();return;}
    saveUndo();S.brks[prevK]=1;S.selWords=[];R();toast('שורה חדשה');
  }
  else if(action==='removeBrk'){
    if(!S.selWords.length){toast('בחרי מילה קודם');return;}
    const k=S.selWords[0];const prevK=getPrevWordKey(k);
    if(prevK&&S.brks[prevK]){saveUndo();delete S.brks[prevK];S.selWords=[];R();toast('שבירה הוסרה');}
    else if(S.brks[k]){saveUndo();delete S.brks[k];S.selWords=[];R();toast('שבירה הוסרה');}
    else{toast('אין שבירה כאן');S.selWords=[];R();}
  }
  else if(action==='para'){
    if(!S.selWords.length){toast('בחרי מילה קודם');return;}
    const k=S.selWords[0];const prevK=getPrevWordKey(k);
    if(!prevK){toast('זו המילה הראשונה');S.selWords=[];R();return;}
    saveUndo();S.brks[prevK]=1;
    const prevVi=parseInt(prevK.split('-')[0]);
    S.paraBreaks[prevVi]=1;S.selWords=[];R();toast('פסקה חדשה');
  }
  else if(action==='indent'||action==='outdent'){
    if(!S.selWords.length){toast('בחרי מילה קודם');return;}
    saveUndo();
    const lines=buildLines();const selK=S.selWords[0];
    const line=lines.find(l=>!l.isPara&&l.words.some(w=>w.k===selK));
    if(!line){S.selWords=[];R();return;}
    const lk=line.lineKey;const cur=S.indents[lk]||0;
    if(action==='indent'){S.indents[lk]=Math.min(cur+1,6);toast('→ הוזח');}
    else{if(cur>0){S.indents[lk]=cur-1;toast('← הוחזר');}else{toast('כבר בקצה');}}
    R();
  }
}

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();toggleSearch();return;}
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='?'||e.key==='/'){S.showKeys=!S.showKeys;R();return;}
  if(e.key==='Escape'&&S.showKeys){S.showKeys=false;R();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();doRedo();return;}
  if(S.step!==0)return;
  if(e.key==='Enter'){e.preventDefault();if(e.shiftKey)imudAction('para');else imudAction('break');}
  else if(e.key==='Tab'){e.preventDefault();if(e.shiftKey)imudAction('outdent');else imudAction('indent');}
  else if(e.key==='Delete'||e.key==='Backspace'){if(S.selWords.length){e.preventDefault();imudAction('removeBrk');}}
});

function autoLayout(){

  const topLevel=[];
  S.pkgs.forEach((p,i)=>{

    if(!hasParent)topLevel.push(i);

  const cols=Math.ceil(Math.sqrt(topLevel.length));
  topLevel.forEach((pi,idx)=>{
    if(!S.nodes[pi])S.nodes[pi]={w:220};
    S.nodes[pi].x=60+(idx%cols)*280;
    S.nodes[pi].y=50+Math.floor(idx/cols)*220;

// File upload
function replaceDivineName(t){
  // Match יהוה with any combination of niqqud (U+05B0-U+05BD,U+05BF,U+05C1-U+05C2,U+05C4-U+05C5,U+05C7) and cantillation (U+0591-U+05AF)
  const m='[\u0591-\u05C7]*';
  const base=new RegExp('([לבומ][\u0591-\u05C7]*)?י'+m+'ה'+m+'ו'+m+'ה'+m,'g');
  return t.replace(base,(match,prefix)=>{
    if(!prefix)return 'ה׳';
    const p=prefix.replace(/[\u0591-\u05C7]/g,'');
    if(p==='ל')return 'לַה׳';
    if(p==='ב')return 'בַּה׳';
    if(p==='ו')return 'וַה׳';
    if(p==='מ')return 'מֵה׳';
    return prefix+'ה׳';
  });
}

  R();toast('הטקסט נטען: '+customName);
}

function exportImage(){

function doImageExport(){
  const mainEl=document.querySelector('.main');
  if(!mainEl){toast('לא נמצא תוכן');return;}
  const el=mainEl.querySelector('.text-area')||mainEl.querySelector('.canvas')||mainEl.querySelector('.read-card')||mainEl;
  // Temporarily reset zoom if canvas
  const origZoom=S.cvZoom;
  const cvInner=document.getElementById('cvInner');
  if(cvInner){S.cvZoom=100;cvInner.style.transform='none';cvInner.style.minHeight='auto'}
  toast('מצלם תמונה...');
  html2canvas(el,{
    scale:2,
    useCORS:true,
    backgroundColor:getComputedStyle(document.body).backgroundColor||'#F9F6F2',
    logging:false,
    allowTaint:true
  }).then(function(canvas){
    // Restore zoom
    if(cvInner){S.cvZoom=origZoom;R()}
    canvas.toBlob(function(blob){
      if(blob){
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='tanakh-laomek-'+D().title+'.png';
        a.click();
        toast('תמונה נשמרה!');
      }else{toast('שגיאה ביצירת תמונה');}
    },'image/png');
  }).catch(function(err){
    if(cvInner){S.cvZoom=origZoom;R()}
    toast('שגיאה: '+err.message);
  });
}

function importJSON(){
  S.showExport=false;R();

  input.onchange=function(){
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const d=JSON.parse(e.target.result);
        if(d.customText)TEXTS.custom=d.customText;
        S.doc=d.doc||'psalms1';S.step=d.step||0;S.font=d.font||'assistant';
        S.brks=d.brks||{};S.indents=d.indents||{};S.paraBreaks=d.paraBreaks||{};
        S.fs=d.fs||22;S.lh=d.lh||1.5;
        S.cats=d.cats||[];S.activeCat=d.activeCat||0;S.activeSub=d.activeSub||0;
        S.marks=d.marks||{};S.vf=d.vf||'all';S.hiddenDocs=d.hiddenDocs||[];
        if(d.darkMode!==undefined)S.darkMode=d.darkMode;
        S.pkgs=d.pkgs||[];S.nodes=d.nodes||[];S.conns=d.conns||[];S.expandedPkgs=d.expandedPkgs||{};
        S.stickies=d.stickies||[];S.labels=d.labels||[];S.shapes=d.shapes||[];
        S.notes=d.notes||{0:'',1:'',2:'',3:'',4:''};
        S.cvZoom=d.cvZoom||100;S.cvTool=d.cvTool||'move';S.shapeColor=d.shapeColor||0;
        S.splash=false;
        document.documentElement.classList.toggle('dark',S.darkMode);

      }catch(err){toast('שגיאה בקריאת הקובץ: '+err.message);}

    reader.readAsText(file);
  };
  input.click();
}
