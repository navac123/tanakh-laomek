<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תנ״ך לעומק</title>
<!-- Google Analytics — החלף YOUR_MEASUREMENT_ID במזהה שלך מ-analytics.google.com -->
<script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_MEASUREMENT_ID"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','YOUR_MEASUREMENT_ID');
</script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@400;500;700&family=David+Libre:wght@400;500;700&family=Noto+Serif+Hebrew:wght@400;500;700&family=Secular+One&family=Rubik:wght@400;500;700&family=Assistant:wght@400;600;700&family=Miriam+Libre:wght@400;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#F9F6F2;--bg-warm:#EFEFEF;--bg-glass:rgba(255,255,255,.65);--bg-glass-strong:rgba(255,255,255,.75);--bg-glass-light:rgba(255,255,255,.5);
  --text:#1C335F;--text-muted:#4A5A7A;--text-faint:#8A96AA;
  --earth:#1C335F;--teal:#CFE2F3;--coral:#FF8C69;
  --border:#D9DFF2;--hover:#EFEFEF;
  --pastel-purple:#D9DFF2;--pastel-blue:#CFE2F3;--pastel-peach:#FBD5B5;--pastel-yellow:#FFF2CC;--pastel-pink:#E6D0DE;--pastel-green:#D5E8D4;
  --glass-blur:blur(12px);--glass-blur-sm:blur(8px);--glass-blur-lg:blur(10px);
  --teal-glass:rgba(207,226,243,.15);--teal-border:rgba(207,226,243,.4);
  --earth-glass:rgba(28,51,95,.06);--earth-glass-hover:rgba(28,51,95,.1);
  --shadow:0 2px 12px rgba(28,51,95,.05);--shadow-md:0 8px 24px rgba(28,51,95,.1);--shadow-lg:0 12px 40px rgba(28,51,95,.12);
  --toast-bg:rgba(28,51,95,.92);--toast-text:#F9F6F2;
  --splash-grad:linear-gradient(135deg,#F9F6F2 0%,#EFEFEF 30%,#F9F6F2 70%,#D9DFF2 100%);
  --step-bg:#EFEFEF;--step-active-bg:#1C335F;--step-active-text:#fff;
  --btn-primary-bg:#FF8C69;--btn-primary-text:#fff;--btn-primary-hover:#FF7A55;
  --logo-fill:#1C335F;--logo-text:#F9F6F2;--logo-accent:#FF8C69;
  --canvas-dots:#D9DFF2;
  --node-shadow:0 2px 6px rgba(28,51,95,.08);
  --arrow-label-bg:rgba(255,255,255,.75);
  --export-overlay:rgba(28,51,95,.35);--modal-overlay:rgba(28,51,95,.3);
  --tooltip-bg:#1C335F;--tooltip-text:#fff;
}
html.dark{
  --bg:#121A2E;--bg-warm:#1A2240;--bg-glass:rgba(18,26,46,.7);--bg-glass-strong:rgba(18,26,46,.8);--bg-glass-light:rgba(18,26,46,.55);
  --text:#E8ECF4;--text-muted:#A0AABF;--text-faint:#6A7590;
  --earth:#7A9DC4;--teal:#4A6A8A;--coral:#FF8C69;
  --border:#2A3555;--hover:#1E2845;
  --pastel-purple:#2A3060;--pastel-blue:#253050;--pastel-peach:#3A2820;--pastel-yellow:#2A2818;--pastel-pink:#2A2030;--pastel-green:#1A2A1A;
  --teal-glass:rgba(74,106,138,.18);--teal-border:rgba(74,106,138,.3);
  --earth-glass:rgba(122,157,196,.1);--earth-glass-hover:rgba(122,157,196,.15);
  --shadow:0 2px 12px rgba(0,0,0,.25);--shadow-md:0 8px 24px rgba(0,0,0,.35);--shadow-lg:0 12px 40px rgba(0,0,0,.4);
  --toast-bg:rgba(232,236,244,.94);--toast-text:#121A2E;
  --splash-grad:linear-gradient(135deg,#121A2E 0%,#1A2240 30%,#121A2E 70%,#1E2845 100%);
  --step-bg:#1A2240;--step-active-bg:#FF8C69;--step-active-text:#121A2E;
  --btn-primary-bg:#FF8C69;--btn-primary-text:#121A2E;--btn-primary-hover:#FFA080;
  --logo-fill:#7A9DC4;--logo-text:#121A2E;--logo-accent:#FF8C69;
  --canvas-dots:#2A3555;
  --node-shadow:0 2px 6px rgba(0,0,0,.35);
  --arrow-label-bg:rgba(18,26,46,.75);
  --export-overlay:rgba(8,12,24,.5);--modal-overlay:rgba(8,12,24,.4);
  --tooltip-bg:#E8ECF4;--tooltip-text:#121A2E;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* ===== SPLASH SCREEN ===== */
.splash{position:fixed;inset:0;z-index:9999;background:var(--splash-grad);display:flex;align-items:center;justify-content:center;animation:splashIn .6s ease;overflow:hidden}
@keyframes splashIn{from{opacity:0}to{opacity:1}}
.splash.out{animation:splashOut .5s ease forwards}
@keyframes splashOut{to{opacity:0;pointer-events:none}}
.splash-wrap{display:flex;align-items:center;gap:60px;max-width:960px;width:100%;padding:20px 40px;animation:splashFloat .8s ease}
@keyframes splashFloat{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.splash-illust{flex-shrink:0;width:340px;position:relative}
.splash-illust svg{width:100%;height:auto}
.splash-content{flex:1;text-align:center}
.splash-logo{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px}
.splash-title{font-size:50px;font-weight:900;color:var(--text);letter-spacing:-1.5px;line-height:1.1}
.splash-title span{color:var(--coral);position:relative}
.splash-sub{font-size:16px;color:var(--text-muted);margin-bottom:36px;font-weight:400;line-height:1.7;letter-spacing:.2px}
.splash-steps{display:flex;align-items:flex-start;justify-content:center;margin-bottom:40px;position:relative;direction:rtl}
.splash-steps-line{position:absolute;top:28px;left:42px;right:42px;height:2px;background:var(--border);z-index:0}
.splash-step{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:80px;flex:1;position:relative;z-index:1}
.splash-step-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;transition:transform .25s}
.splash-step-ring-bg{position:absolute;inset:0;border-radius:50%;border:3px solid var(--border);opacity:.3}
.splash-step-ring-fill{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:currentColor;border-right-color:currentColor;transform:rotate(-45deg)}
.splash-step-inner{width:42px;height:42px;border-radius:50%;background:var(--bg-glass-strong);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--text);z-index:1;border:1.5px solid var(--border);backdrop-filter:var(--glass-blur-sm)}
.splash-step:hover .splash-step-ring{transform:scale(1.08)}
.splash-step-l{font-size:12px;font-weight:700;color:var(--text)}
.splash-go{background:linear-gradient(135deg,#FF8C69 0%,#FF7A55 100%);color:#fff;border:none;padding:16px 52px;border-radius:16px;font-size:18px;font-weight:700;font-family:'Heebo';cursor:pointer;transition:all .3s cubic-bezier(.22,1,.36,1);box-shadow:0 6px 20px rgba(255,140,105,.3);display:inline-block;position:relative;overflow:hidden}
.splash-go::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 50%);opacity:0;transition:opacity .3s}
.splash-go:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(255,140,105,.4)}
.splash-go:hover::before{opacity:1}
.splash-go:active{transform:scale(.97);box-shadow:0 4px 12px rgba(255,140,105,.25)}
.splash-saved{margin-top:16px}
.splash-saved-btn{background:var(--bg-glass);backdrop-filter:var(--glass-blur-sm);border:1.5px solid var(--border);color:var(--text);padding:10px 28px;border-radius:12px;font-size:13px;font-weight:700;font-family:'Heebo';cursor:pointer;transition:all .2s}
.splash-saved-btn:hover{background:var(--bg-glass-strong);border-color:var(--text)}
.splash-footer{margin-top:28px;font-size:11px;color:var(--text-faint)}
@media(max-width:820px){.splash-wrap{flex-direction:column;gap:30px;padding:20px}.splash-illust{width:220px}.splash-content{text-align:center}.splash-logo{justify-content:center}.splash-title{font-size:36px}}

/* Decorative floating elements */
.splash-decor{position:absolute;pointer-events:none;z-index:0;opacity:.35}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(8deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(-6deg)}}
@keyframes floatC{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.08)}}
.dec-a{animation:floatA 6s ease-in-out infinite}
.dec-b{animation:floatB 5s ease-in-out infinite .5s}
.dec-c{animation:floatC 7s ease-in-out infinite 1s}
.dec-d{animation:floatA 8s ease-in-out infinite 1.5s}
.dec-e{animation:floatB 6s ease-in-out infinite 2s}
.dec-f{animation:floatC 5s ease-in-out infinite .8s}

/* ===== ANIMATIONS ===== */
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes popIn{0%{opacity:0;transform:scale(.8)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes gentlePulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes wordMark{0%{filter:brightness(1.3)}100%{filter:brightness(1)}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(255,140,105,.4)}100%{box-shadow:0 0 0 12px rgba(255,140,105,0)}}

/* ===== MAIN TRANSITIONS ===== */
.main{flex:1;overflow-y:auto;padding:20px 28px;animation:fadeSlide .35s cubic-bezier(.22,1,.36,1)}

/* Top bar */
.topbar{background:var(--bg-glass-strong);backdrop-filter:var(--glass-blur);padding:8px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 12px rgba(28,51,95,.06)}
.logo{font-size:18px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:-.3px;cursor:pointer;transition:opacity .2s}
.logo:hover{opacity:.8}
.logo svg{width:24px;height:24px}
.top-docs{display:flex;gap:4px;margin-right:auto}
.top-doc{padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-glass-light);color:var(--text-muted);transition:all .2s;font-family:'Heebo';display:flex;align-items:center;gap:6px;position:relative}
.top-doc:hover{border-color:var(--earth);color:var(--text)}
.top-doc.a{background:var(--btn-primary-bg);color:var(--btn-primary-text);border-color:var(--btn-primary-bg)}
.top-doc-x{font-size:14px;font-weight:700;opacity:0;transition:opacity .2s;color:var(--text-faint);cursor:pointer;padding:0 2px;line-height:1}
.top-doc:hover .top-doc-x{opacity:.6}
.top-doc-x:hover{opacity:1!important;color:var(--coral)}
.upload-btn{padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--earth);background:var(--bg-glass-light);color:var(--text);font-family:'Heebo'}
.upload-btn:hover{background:var(--earth);color:#fff}

/* Steps — colored pill tabs */
.steps{display:flex;justify-content:center;gap:6px;padding:8px 20px;background:var(--bg-glass-light);backdrop-filter:var(--glass-blur-sm);border-bottom:1px solid var(--border)}
.st{display:flex;align-items:center;gap:6px;padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all .3s cubic-bezier(.22,1,.36,1);border-radius:12px;position:relative;border:1.5px solid transparent}
.st:hover{color:var(--text);background:var(--hover);transform:translateY(-1px)}
.st.a{color:var(--text);font-weight:700;border-color:var(--text);box-shadow:0 2px 8px rgba(28,51,95,.1)}
.st.d{color:var(--text)}
.st.a::after{content:'';position:absolute;bottom:-2px;left:25%;right:25%;height:2.5px;background:var(--coral);border-radius:2px;animation:scaleIn .3s ease}
.st-i{font-size:10px;font-weight:700;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
.st[data-step="0"] .st-i{background:var(--pastel-purple);color:var(--text)}
.st[data-step="1"] .st-i{background:var(--pastel-blue);color:var(--text)}
.st[data-step="2"] .st-i{background:var(--pastel-peach);color:var(--text)}
.st[data-step="3"] .st-i{background:var(--pastel-yellow);color:var(--text)}
.st[data-step="4"] .st-i{background:var(--pastel-pink);color:var(--text)}
.st.a .st-i{background:var(--step-active-bg);color:var(--step-active-text)}
.st-ln{display:none}

/* Layout */
.wrap{display:flex;height:calc(100vh - 94px)}
.side{width:310px;background:var(--bg-glass);backdrop-filter:var(--glass-blur-lg);border-right:1px solid var(--border);overflow-y:auto;padding:16px;box-shadow:var(--shadow);animation:slideRight .35s cubic-bezier(.22,1,.36,1)}

/* Sidebar */
.sb-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;letter-spacing:-.2px}
.sb-hint{background:var(--teal-glass);border:1px solid var(--teal);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--text);margin-bottom:12px;line-height:1.7}
.sb-sub{font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:6px;margin-top:14px;text-transform:uppercase;letter-spacing:.3px}
.sb-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.22,1,.36,1);border:none;font-family:'Heebo';position:relative;overflow:hidden}
.sb-btn:active{transform:scale(.96)}
.sb-btn-blue{background:var(--btn-primary-bg);color:var(--btn-primary-text);box-shadow:0 2px 8px rgba(255,140,105,.2)}
.sb-btn-blue:hover{background:var(--btn-primary-hover);transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,140,105,.3)}
.sb-btn-green{background:var(--coral);color:#fff;box-shadow:0 2px 8px rgba(255,140,105,.2)}
.sb-btn-green:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,140,105,.3);background:#FF7A55}
.sb-btn-out{background:var(--bg-glass-light);border:1.5px solid var(--border);color:var(--text-muted)}
.sb-btn-out:hover{border-color:var(--earth);color:var(--text);background:var(--earth-glass);transform:translateY(-1px)}
.sb-btn-sm{padding:6px 12px;font-size:11px;width:auto;border-radius:8px}
.sb-input{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Heebo';outline:none;direction:rtl;background:var(--bg);color:var(--text);transition:all .2s}
.sb-input:focus{border-color:var(--earth);box-shadow:0 0 0 3px rgba(28,51,95,.08)}

/* Color palette */
.pal{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.pal-c{width:28px;height:28px;border-radius:8px;cursor:pointer;transition:all .2s cubic-bezier(.22,1,.36,1);border:2.5px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pal-c:hover{transform:scale(1.15);box-shadow:0 3px 8px rgba(0,0,0,.12)}
.pal-c.a{border-color:var(--text);transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* Text area */
.text-area{background:var(--bg-glass);backdrop-filter:var(--glass-blur-lg);border-radius:16px;padding:24px 32px 24px 32px;box-shadow:0 4px 20px rgba(28,51,95,.06);max-width:800px;margin:0 auto;position:relative;border:1px solid var(--teal-border);animation:scaleIn .35s cubic-bezier(.22,1,.36,1)}

/* Verse — fixed right column approach */
.verse-row{position:relative;min-height:1em}
.verse-n{position:absolute;right:-36px;top:4px;font-family:'Heebo';font-size:11px;color:var(--text-faint);font-weight:400;user-select:none;width:28px;text-align:center}
.verse-n-click{cursor:pointer;transition:all .15s;color:var(--text-faint)}
.verse-n-click:hover{color:var(--earth)}
.verse-n-click.sel{color:var(--earth);font-weight:700}
.pkg-box .verse-n{color:var(--text-muted);font-size:10px;right:-30px}

/* Words */
.w{
  font-size:22px;line-height:1.6;
  display:inline;padding:2px 4px;border-radius:5px;
  cursor:pointer;transition:all .15s cubic-bezier(.22,1,.36,1);
}
.w:hover{background:var(--hover)}
.disc-mode .w{
  padding:3px 5px;border-radius:6px;cursor:crosshair;
  border:1.5px solid transparent;transition:all .12s ease;
}
.disc-mode .w:hover{
  background:var(--earth-glass-hover);border-color:var(--border);
  box-shadow:0 2px 8px rgba(28,51,95,.1);
  z-index:1;position:relative;
}
.disc-mode .w:active{filter:brightness(.93);transition:filter .05s}
.disc-indicator{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:0 0 12px 12px;font-size:12px;font-weight:700;backdrop-filter:var(--glass-blur-sm);border-bottom:1.5px solid var(--border);margin:-24px -32px 16px -32px;background:var(--bg-glass-strong)}
.w-hl{border-radius:5px;padding:2px 5px;animation:wordMark .3s ease}
.w-hl:hover{filter:brightness(1.08)}

/* Imud (layout) specific */
.imud-word{
  display:inline;padding:1px 2px;border-radius:4px;
  cursor:pointer;transition:all .15s;position:relative;
}
.imud-word:hover{background:var(--hover)}
.imud-word.selected{background:rgba(207,226,243,.5);border-radius:4px}

/* Line in imud mode */
.imud-line{min-height:1em;position:relative;transition:padding-right .2s}

/* Paragraph break */
.para-break{height:12px;border-bottom:1px dashed var(--teal);margin:4px 0}

/* Toolbar for imud */
.imud-toolbar{
  display:flex;gap:4px;padding:8px 12px;background:var(--bg-glass-light);backdrop-filter:var(--glass-blur-sm);border-radius:12px;
  margin-bottom:16px;align-items:center;flex-wrap:wrap;border:1px solid var(--border)
}
.tb-btn{
  padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);
  cursor:pointer;font-size:12px;font-weight:600;font-family:'Heebo';
  transition:all .15s;display:flex;align-items:center;gap:4px;color:var(--text-muted)
}
.tb-btn:hover{border-color:var(--earth);color:var(--text);background:var(--hover)}
.tb-btn:active{transform:scale(.95)}
.tb-btn.active{background:var(--btn-primary-bg);color:var(--btn-primary-text);border-color:var(--btn-primary-bg)}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px}

/* Package zone */
.pkg-zone{border-radius:12px;padding:12px 16px;margin-bottom:10px;position:relative;border-right:4px solid}
.pkg-zone-label{font-size:14px;font-weight:800;margin-bottom:4px}

/* Category cards in discovery */
.cat-card{padding:8px 10px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .25s cubic-bezier(.22,1,.36,1);margin-bottom:6px;display:flex;align-items:center;gap:8px;animation:slideUp .3s ease}
.cat-card:hover{border-color:var(--teal);background:var(--teal-glass);transform:translateX(-3px)}
.cat-card.a{border-color:var(--earth);background:var(--earth-glass-hover);box-shadow:0 2px 8px rgba(28,51,95,.08)}
.cat-ic{font-size:16px}
.cat-nm{font-size:12px;font-weight:700}
.cat-ds{font-size:10px;color:var(--text-faint)}
.cat-cnt{margin-right:auto;font-size:11px;background:var(--hover);padding:2px 6px;border-radius:6px;font-weight:700}
.cat-swatch{width:22px;height:16px;border-radius:4px;flex-shrink:0}

/* Legend */
.legend{background:var(--teal-glass);border:1px solid var(--teal-border);border-radius:12px;padding:10px 12px;margin-top:10px}
.legend-title{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.legend-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:3px;font-size:12px}
.legend-item:hover{background:var(--earth-glass-hover)}
.legend-item.active{background:var(--earth-glass-hover);font-weight:700}
.legend-item.dimmed{opacity:.35}
.legend-swatch{width:20px;height:14px;border-radius:4px;flex-shrink:0}
.legend-del{margin-right:auto;font-size:10px;color:var(--coral);cursor:pointer;opacity:0;transition:opacity .15s}
.legend-item:hover .legend-del{opacity:1}

/* Pkg cards in sidebar */
.pk-card{border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1.5px solid;transition:all .2s;animation:slideUp .3s ease}
.pk-card:hover{transform:translateX(-2px);box-shadow:0 2px 8px rgba(28,51,95,.06)}
.pk-nm{font-size:13px;font-weight:800;margin-bottom:4px;letter-spacing:-.2px}
.pk-tags{display:flex;flex-wrap:wrap;gap:3px}
.pk-tag{font-size:13px;padding:2px 6px;border-radius:6px;background:var(--bg-glass-light);border:1px solid}

/* Canvas */
.canvas{min-height:600px;background:var(--bg-glass-light);backdrop-filter:blur(6px);border-radius:14px;position:relative;background-image:radial-gradient(var(--canvas-dots) 1px,transparent 1px);background-size:20px 20px;overflow:hidden}
.cv-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.cv-svg path{pointer-events:stroke;cursor:pointer}
.cv-svg path:hover{stroke-width:3!important}
.c-node{position:absolute;border-radius:14px;padding:12px 16px;cursor:grab;border:2px solid;min-width:140px;max-width:280px;box-shadow:var(--node-shadow);transition:all .25s cubic-bezier(.22,1,.36,1);z-index:2;user-select:none}
.c-node:hover{box-shadow:0 8px 24px rgba(28,51,95,.14);z-index:10;transform:translateY(-2px)}
.c-child-wrap{margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:6px}
.c-child-inner{border-radius:10px;padding:8px 12px;border:1.5px solid;position:relative;cursor:pointer;transition:box-shadow .2s}
.c-child-inner:hover{box-shadow:var(--node-shadow)}
.c-child-inner .c-node-t{font-size:12px}
.c-child-inner .c-node-w{font-size:12px}
.c-child-label{font-size:9px;font-weight:600;color:var(--text-faint);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.c-node:active{cursor:grabbing}
.c-node.conn-sel{outline:3px dashed var(--coral);outline-offset:3px;animation:connPulse 1s infinite}
@keyframes connPulse{0%,100%{outline-color:var(--coral)}50%{outline-color:rgba(255,140,105,.27)}}
.c-node-t{font-weight:800;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:5px;letter-spacing:-.2px}
.c-node-w{font-size:13px;line-height:1.6;direction:rtl}
.c-node-w.collapsed{max-height:2.6em;overflow:hidden;opacity:.7}
.c-node-tgl{position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:var(--bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;z-index:3}
.c-node-tgl:hover{background:var(--hover);border-color:var(--earth)}
.c-rsz{position:absolute;bottom:2px;left:2px;width:14px;height:14px;cursor:nwse-resize;opacity:.3;z-index:3}
.c-rsz:hover{opacity:.8}
.c-rsz::after{content:'';position:absolute;bottom:0;left:0;width:10px;height:10px;border-bottom:2px solid var(--text-faint);border-left:2px solid var(--text-faint);border-radius:0 0 0 3px}
.c-conn-dot{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:var(--coral);border:2px solid var(--bg);cursor:crosshair;z-index:4;opacity:0;transition:opacity .2s}
.c-node:hover .c-conn-dot{opacity:1}
.conn-mode .c-conn-dot{opacity:1!important}
.conn-mode .c-node{cursor:crosshair}
.c-arrow-label{position:absolute;background:var(--arrow-label-bg);backdrop-filter:blur(6px);border:1px solid var(--coral);border-radius:8px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--text);z-index:3;cursor:pointer;white-space:nowrap}
.c-arrow-label:hover{background:rgba(255,140,105,.1)}

/* Canvas toolbar */
.cv-toolbar{position:sticky;top:0;z-index:20;display:flex;gap:5px;padding:8px 12px;background:var(--bg-glass-strong);backdrop-filter:var(--glass-blur);border-radius:14px;margin-bottom:10px;border:1px solid var(--border);flex-wrap:wrap;align-items:center;box-shadow:0 2px 12px rgba(28,51,95,.06);animation:slideUp .3s ease}
.cv-tbtn{padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:11px;font-weight:600;font-family:'Heebo';transition:all .15s;display:flex;align-items:center;gap:4px;color:var(--text-muted);white-space:nowrap}
.cv-tbtn:hover{border-color:var(--earth);color:var(--text);background:var(--hover)}
.cv-tbtn.active{background:var(--btn-primary-bg);color:var(--btn-primary-text);border-color:var(--btn-primary-bg)}
.cv-tbtn svg{width:14px;height:14px}

/* Sticky notes */
.c-sticky{position:absolute;width:180px;min-height:100px;border-radius:6px;padding:10px 12px;cursor:grab;z-index:3;user-select:none;box-shadow:2px 3px 10px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);transition:all .25s cubic-bezier(.22,1,.36,1);animation:popIn .3s ease}
.c-sticky:hover{box-shadow:4px 6px 20px rgba(0,0,0,.15);z-index:10;transform:translateY(-2px) rotate(-0.5deg)}
.c-sticky:active{cursor:grabbing}
.c-sticky textarea{width:100%;min-height:60px;border:none;background:transparent;font-family:'Heebo';font-size:13px;font-weight:600;resize:none;outline:none;color:inherit;direction:rtl}
.c-sticky-del{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;opacity:0;transition:opacity .2s;color:rgba(0,0,0,.5)}
.c-sticky:hover .c-sticky-del{opacity:1}

/* Text labels on canvas */
.c-label{position:absolute;cursor:grab;z-index:3;user-select:none;transition:box-shadow .2s}
.c-label-drag{cursor:grab;padding:2px 8px;border-radius:4px 4px 0 0;font-size:9px;color:var(--text-faint);text-align:center;opacity:0;transition:opacity .2s;background:var(--bg-glass-strong);border:1px solid var(--border);border-bottom:none;margin-bottom:-1px}
.c-label:hover .c-label-drag{opacity:1}
.c-label:active{cursor:grabbing}
.c-label:hover{z-index:10}
.c-label textarea{border:none;background:transparent;font-family:'Heebo';font-size:16px;font-weight:700;resize:none;outline:none;color:var(--text);direction:rtl;min-width:60px}
.c-label-del{position:absolute;top:-8px;left:-8px;width:18px;height:18px;border-radius:50%;background:var(--coral);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;opacity:0;transition:opacity .2s;color:#fff}
.c-label:hover .c-label-del{opacity:1}

/* Frame backgrounds (behind everything) */
.c-frame-wrap{position:absolute;cursor:grab;z-index:0;user-select:none;transition:filter .2s,box-shadow .2s;animation:popIn .3s ease}
.c-frame-wrap:hover{z-index:0;filter:drop-shadow(0 4px 16px rgba(0,0,0,.08));box-shadow:0 0 0 2px var(--earth-light)}
.c-frame-wrap:active{cursor:grabbing}
.c-frame-header{padding:6px 10px;border-radius:12px 12px 0 0;display:flex;align-items:center}
.c-frame-wrap .shp-del{opacity:0;transition:all .2s}
.c-frame-wrap:hover .shp-del{opacity:1}
.c-frame-wrap .shp-rsz{opacity:0;transition:opacity .2s}
.c-frame-wrap:hover .shp-rsz{opacity:1}

/* Shape wrappers (above frames, below nodes) */
.c-shape-wrap{position:absolute;cursor:grab;z-index:1;user-select:none;transition:filter .2s}
.c-shape-wrap:hover{z-index:10;filter:drop-shadow(0 4px 12px rgba(0,0,0,.12))}
.c-shape-wrap:active{cursor:grabbing}
.shp-del{position:absolute;top:-10px;left:-10px;width:22px;height:22px;border-radius:50%;background:var(--coral);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;opacity:0;transition:all .2s;color:#fff;z-index:5;box-shadow:0 2px 6px rgba(255,140,105,.3)}
.c-shape-wrap:hover .shp-del{opacity:1}
.shp-del:hover{transform:scale(1.15);background:#e55}
.shp-rsz{position:absolute;bottom:-4px;left:-4px;width:16px;height:16px;border-radius:3px;cursor:nwse-resize;opacity:0;transition:opacity .2s;z-index:5;display:flex;align-items:center;justify-content:center;color:var(--text-faint);background:var(--bg-glass-strong);border:1px solid var(--border)}
.c-shape-wrap:hover .shp-rsz{opacity:1}
.shp-rsz:hover{opacity:1!important;color:var(--text);border-color:var(--earth)}

/* Separator shapes */
.c-shape{position:absolute;z-index:1;pointer-events:none;opacity:.6}

/* Zoom */
.cv-zoom{position:absolute;bottom:12px;left:12px;z-index:20;display:flex;gap:4px;align-items:center;background:var(--bg-glass-strong);backdrop-filter:var(--glass-blur-sm);border-radius:12px;padding:6px 10px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(28,51,95,.08)}
.cv-zoom-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text-muted);transition:all .15s}
.cv-zoom-btn:hover{background:var(--hover);color:var(--text)}
.cv-zoom-lbl{font-size:11px;font-weight:700;color:var(--text-muted);min-width:36px;text-align:center}

/* Reading */
.read-card{background:var(--bg-glass);backdrop-filter:var(--glass-blur-sm);border-radius:16px;padding:24px 32px;margin-bottom:14px;box-shadow:0 4px 20px rgba(28,51,95,.06);border:1px solid var(--teal-border);animation:slideUp .4s cubic-bezier(.22,1,.36,1)}
.read-title{font-size:20px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--toast-bg);backdrop-filter:var(--glass-blur-lg);color:var(--toast-text);padding:12px 28px;border-radius:14px;font-size:13px;font-weight:600;z-index:999;display:none;box-shadow:0 8px 32px rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08)}
.toast.show{display:block;animation:toastIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(.92)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* Toggle */
.tgl{display:flex;background:var(--step-bg);border-radius:10px;padding:3px}
.tgl-b{flex:1;padding:6px 8px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Heebo';transition:all .2s;background:transparent;color:var(--text-faint)}
.tgl-b.a{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* Upload modal */
.modal-bg{position:fixed;inset:0;background:var(--modal-overlay);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--bg-glass-strong);backdrop-filter:var(--glass-blur);border-radius:20px;padding:28px;max-width:440px;width:90%;text-align:center;border:1px solid var(--teal-border);color:var(--text);animation:popIn .35s cubic-bezier(.22,1,.36,1);box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:12px}

/* Info/rationale expandable */
.info-box{background:var(--teal-glass);border:1px solid var(--teal);border-radius:12px;padding:12px 14px;font-size:11px;color:var(--text);margin-bottom:12px;line-height:1.7;cursor:pointer;transition:all .2s}
.info-box:hover{background:var(--earth-glass);border-color:var(--earth)}
.info-box b{font-weight:700}
.info-expand{max-height:0;overflow:hidden;transition:max-height .3s ease}
.info-expand.open{max-height:800px}

/* Export modal */
.export-bg{position:fixed;inset:0;background:var(--export-overlay);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.export-modal{background:var(--bg-glass-strong);backdrop-filter:var(--glass-blur);border-radius:20px;padding:28px 32px;max-width:420px;width:90%;text-align:center;animation:splashFloat .3s ease;border:1px solid var(--teal-border)}
.export-modal h3{font-size:18px;margin-bottom:6px}
.export-modal p{font-size:13px;color:var(--text-muted);margin-bottom:18px}
.export-opt{display:flex;gap:10px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.export-btn{padding:12px 20px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-family:'Heebo';font-size:13px;font-weight:600;transition:all .25s cubic-bezier(.22,1,.36,1);min-width:110px;color:var(--text);position:relative;overflow:hidden}
.export-btn:hover{border-color:var(--earth);color:var(--text);transform:translateY(-2px);box-shadow:0 6px 18px rgba(28,51,95,.1);background:var(--earth-glass)}
.export-btn:active{transform:scale(.96)}

/* Tooltip for words */
.w-tip{position:absolute;bottom:calc(100% + 6px);right:50%;transform:translateX(50%);background:var(--tooltip-bg);color:var(--tooltip-text);padding:6px 10px;border-radius:8px;font-size:11px;font-family:'Heebo';white-space:nowrap;z-index:50;pointer-events:none;opacity:0;transition:opacity .2s;box-shadow:0 4px 12px rgba(0,0,0,.19)}
.w-tip::after{content:'';position:absolute;top:100%;right:50%;transform:translateX(50%);border:5px solid transparent;border-top-color:var(--tooltip-bg)}
.w:hover .w-tip{opacity:1}

/* Notebook panel */
.nb-toggle{padding:5px 8px;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-glass-light);color:var(--text);display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s;font-size:12px;font-weight:600;font-family:'Heebo'}
.nb-toggle:hover{border-color:var(--earth);background:var(--earth-glass)}
.nb-toggle.open{background:var(--earth-glass-hover);border-color:var(--earth);color:var(--earth-dark,#1C335F)}
.nb-panel{position:fixed;top:0;left:-380px;width:360px;height:100vh;background:var(--bg-glass-strong);backdrop-filter:var(--glass-blur);border-right:1.5px solid var(--border);z-index:200;transition:left .3s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(28,51,95,.08)}
.nb-panel.open{left:0}
.nb-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.nb-header h3{font-size:16px;font-weight:800;margin:0;display:flex;align-items:center;gap:8px}
.nb-close{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-muted);transition:all .15s}
.nb-close:hover{background:var(--hover);border-color:var(--coral);color:var(--coral)}
.nb-tabs{display:flex;gap:2px;padding:10px 16px 0;flex-wrap:wrap}
.nb-tab{padding:6px 12px;border-radius:8px 8px 0 0;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;transition:all .15s;color:var(--text-muted);font-family:'Heebo'}
.nb-tab:hover{background:var(--hover);color:var(--text)}
.nb-tab.a{background:var(--bg);border-color:var(--border);color:var(--text);font-weight:700}
.nb-body{flex:1;padding:12px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.nb-label{font-size:12px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.nb-area{flex:1;min-height:120px;width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'Heebo';font-size:14px;direction:rtl;resize:none;outline:none;line-height:1.8;background:var(--bg);color:var(--text);transition:border-color .2s;box-sizing:border-box}
.nb-area:focus{border-color:var(--earth)}
.nb-area::placeholder{color:var(--text-faint)}
.nb-hint{font-size:11px;color:var(--text-faint);line-height:1.5}
.nb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:199;animation:fadeIn .2s ease}
@media(max-width:768px){
  .nb-panel{width:300px;left:-320px}
}

/* Print styles for export */
@media print{
  .topbar,.steps,.side,.splash,.toast,.modal-bg,.export-bg,.cv-toolbar,.cv-zoom,
  .shp-del,.shp-rsz,.c-sticky-del,.c-label-del,.c-label-drag,.c-rsz,.c-conn-dot,.c-node-tgl,
  .disc-indicator,.nb-panel,.nb-overlay,.nb-toggle{display:none!important}
  body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
  *{animation:none!important;transition:none!important}
  .wrap{display:block!important;height:auto!important;overflow:visible!important}
  .main{padding:10px!important;animation:none!important;overflow:visible!important;height:auto!important}
  .text-area{box-shadow:none!important;border:1px solid #ddd!important;max-width:100%!important;padding:16px!important;border-radius:8px!important}
  .canvas{overflow:visible!important;min-height:auto!important;height:auto!important;background-image:none!important;border:1px solid #ddd!important;page-break-inside:avoid}
  .canvas>div,.canvas #cvInner{transform:none!important;min-height:auto!important;min-width:auto!important}
  .c-node{box-shadow:0 1px 3px rgba(0,0,0,.1)!important;page-break-inside:avoid}
  .c-frame-wrap{box-shadow:none!important}
  .c-sticky{box-shadow:1px 2px 4px rgba(0,0,0,.1)!important}
  .c-shape-wrap{filter:none!important}
  .w{border:none!important;padding:1px 2px!important}
  .legend{page-break-inside:avoid}
  .read-card{box-shadow:none!important;border:1px solid #ddd!important;page-break-inside:avoid}
  .info-box{page-break-inside:avoid}
}

/* Mobile responsive */
@media(max-width:768px){
  .topbar{padding:6px 10px;gap:8px;flex-wrap:wrap}
  .logo{font-size:16px}
  .top-docs{gap:2px}
  .top-doc{padding:4px 8px;font-size:10px}
  .steps{padding:6px 10px;gap:1px;overflow-x:auto}
  .st{padding:6px 10px;font-size:10px;gap:3px}
  .st-i{font-size:14px}
  .wrap{flex-direction:column;height:auto}
  .side{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:40vh;overflow-y:auto;padding:12px;backdrop-filter:none;background:var(--bg-glass-strong)}
  .main{padding:12px 14px}
  .text-area{padding:16px 18px;border-radius:12px}
  .splash-card{padding:20px;max-width:95%}
  .splash-logo{font-size:36px}
  .splash-sub{font-size:13px}
  .splash-steps{gap:4px}
  .splash-step{padding:6px 8px;min-width:56px}
  .splash-step-i{font-size:18px}
  .splash-step-l{font-size:9px}
  .splash-go{padding:10px 28px;font-size:14px}
  .canvas{min-width:auto!important}
  .c-node{min-width:140px!important}
  .sb-hint{font-size:11px}
  .modal{padding:20px;max-width:95%}
  .read-card{padding:14px}
}

/* New category input area */
.new-cat-area{background:var(--earth-glass);border:1.5px dashed var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
.new-cat-area input,.new-cat-area select{font-family:'Heebo';font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;outline:none;background:var(--bg);color:var(--text)}
.new-cat-area input:focus,.new-cat-area select:focus{border-color:var(--earth)}

/* Style preview inline */
.style-preview{font-size:14px;display:inline-block;padding:2px 6px;direction:rtl}

/* Package box styles */
.pkg-box{border-radius:14px;padding:4px 0;margin:6px 0;position:relative;transition:all .2s}
.pkg-box-fill{padding:14px 16px 10px;background-color:var(--pkg-bg)}
.pkg-box-subtle{padding:14px 16px 10px;border:2px dashed;background-color:var(--pkg-bg-subtle);border-color:var(--pkg-border)}
.pkg-box-border{padding:14px 16px 10px;border:2px solid;background:transparent;border-color:var(--pkg-border)}
.pkg-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.pkg-emoji{font-size:18px}
.pkg-name{font-size:14px;font-weight:800}
.pkg-child{margin:8px 12px;border-radius:10px}
.pkg-child .imud-line{font-size:inherit}

/* Emoji picker */
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px}
.emoji-pick{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;font-size:16px}
.emoji-pick:hover{background:var(--hover);border-color:var(--teal)}
.emoji-pick.a{background:var(--hover);border-color:var(--earth)}

/* Style toggle for packages */
.style-tgl{display:flex;gap:4px;margin-bottom:8px}
.style-opt{flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;text-align:center;font-size:10px;font-weight:600;font-family:'Heebo';transition:all .15s;color:var(--text-muted)}
.style-opt:hover{border-color:var(--earth)}
.style-opt.a{border-color:var(--earth);background:var(--earth-glass-hover);color:var(--text)}

/* Package card in sidebar */
.pkg-card{background:var(--earth-glass);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;font-size:12px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.pkg-card-name{flex:1;display:flex;align-items:center;gap:6px}
.pkg-card-color{width:18px;height:18px;border-radius:4px;flex-shrink:0}
.pkg-card-delete{cursor:pointer;color:var(--coral);font-weight:700;font-size:14px;transition:all .15s}
.pkg-card-delete:hover{opacity:.8}

/* Selection in verses */
.verse-selected{background:rgba(174,198,207,.5)!important;border-radius:4px}

/* Info box expandable */
.info-box{background:var(--teal-glass);border:1px solid var(--teal);border-radius:12px;padding:10px 14px;font-size:12px;color:var(--text);cursor:pointer;margin-bottom:10px;transition:all .2s;line-height:1.6}
.info-box:hover{background:var(--teal-glass)}
.info-expand{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s;opacity:0}
.info-expand.open{max-height:600px;opacity:1}

/* Modal polish */
.modal-bg{position:fixed;inset:0;background:var(--modal-overlay);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--bg-glass-strong);backdrop-filter:var(--glass-blur);border-radius:20px;padding:28px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.12);animation:modalPop .3s ease;border:1px solid var(--teal-border);color:var(--text)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* Search */
.search-wrap{display:flex;align-items:center;gap:4px;position:relative}
.search-input{width:0;padding:0;border:1.5px solid transparent;border-radius:10px;font-size:12px;font-family:'Heebo';outline:none;background:var(--bg);color:var(--text);transition:all .3s cubic-bezier(.22,1,.36,1);direction:rtl;opacity:0}
.search-input.open{width:160px;padding:5px 10px;border-color:var(--border);opacity:1}
.search-input:focus{border-color:var(--earth);box-shadow:0 0 0 3px rgba(28,51,95,.08)}
.search-input::placeholder{color:var(--text-faint)}
.w-search-hl{outline:2.5px solid var(--coral);outline-offset:1px;border-radius:4px;animation:gentlePulse 1.5s infinite}
.search-count{font-size:10px;color:var(--text-faint);font-weight:600;white-space:nowrap}

</style>
</head>

psalms1:{title:'תהלים א׳',verses:[

{n:'ג',t:'וְֽהָיָ֗ה כְּעֵץ֮ שָׁת֪וּל עַל פַּלְגֵ֫י מָ֥יִם אֲשֶׁ֤ר פִּרְי֨וֹ יִתֵּ֬ן בְּעִתּ֗וֹ וְעָלֵ֥הוּ לֹא יִבּ֑וֹל וְכֹ֖ל אֲשֶׁר יַעֲשֶׂ֣ה יַצְלִֽיחַ'},
{n:'ד',t:'לֹא כֵ֥ן הָרְשָׁעִ֑ים כִּ֥י אִם כַּ֝מֹּ֗ץ אֲשֶׁר תִּדְּפֶ֥נּוּ רֽוּחַ'},
{n:'ה',t:'עַל כֵּ֤ן לֹא יָקֻ֣מוּ רְ֭שָׁעִים בַּמִּשְׁפָּ֑ט וְ֝חַטָּאִ֗ים בַּעֲדַ֥ת צַדִּיקִֽים'},

psalms13:{title:'תהלים י״ג',verses:[
{n:'א',t:'לַמְנַצֵּ֗חַ מִזְמ֥וֹר לְדָוִֽד'},
{n:'ב',t:'עַד־אָ֣נָה ה֭׳ תִּשְׁכָּחֵ֣נִי נֶ֑צַח עַד־אָ֓נָה תַּסְתִּ֖יר אֶת־פָּנֶ֣יךָ מִמֶּֽנִּי'},
{n:'ג',t:'עַד־אָ֨נָה אָשִׁ֪ית עֵצ֡וֹת בְּנַפְשִׁ֗י יָג֣וֹן בִּלְבָבִ֣י יוֹמָ֑ם עַד־אָ֓נָה יָר֖וּם אֹיְבִ֣י עָלָֽי'},
{n:'ד',t:'הַבִּ֣יטָה עֲ֭נֵנִי ה֣׳ אֱלֹהָ֑י הָאִ֖ירָה עֵינַ֣י פֶּן־אִישַׁ֥ן הַמָּֽוֶת'},
{n:'ה',t:'פֶּן־יֹאמַ֣ר אֹיְבִ֣י יְכׇלְתִּ֑יו צָרַ֥י יָ֝גִ֗ילוּ כִּ֣י אֶמּֽוֹט'},
{n:'ו',t:'וַאֲנִ֤י בְּחַסְדְּךָ֣ בָטָ֑חְתִּי יָ֥גֵל לִ֝בִּ֗י בִּישׁוּעָתֶ֥ךָ אָשִׁ֥ירָה לַ֝ה֗׳ כִּ֣י גָמַ֥ל עָלָֽי'}
]},
psalms23:{title:'תהלים כ״ג',verses:[
{n:'א',t:'מִזְמ֥וֹר לְדָוִ֑ד ה֥׳ רֹ֝עִ֗י לֹ֣א אֶחְסָֽר'},
{n:'ב',t:'בִּנְא֣וֹת דֶּ֭שֶׁא יַרְבִּיצֵ֑נִי עַל־מֵ֖י מְנֻח֣וֹת יְנַהֲלֵֽנִי'},
{n:'ג',t:'נַפְשִׁ֥י יְשׁוֹבֵ֑ב יַנְחֵ֥נִי בְמַעְגְּלֵי־צֶ֝֗דֶק לְמַ֣עַן שְׁמֽוֹ'},
{n:'ד',t:'גַּ֤ם כִּי־אֵלֵ֨ךְ בְּגֵ֪יא צַלְמָ֡וֶת לֹא־אִירָ֣א רָ֭ע כִּי־אַתָּ֣ה עִמָּדִ֑י שִׁבְטְךָ֥ וּ֝מִשְׁעַנְתֶּ֗ךָ הֵ֣מָּה יְנַחֲמֻֽנִי'},
{n:'ה',t:'תַּעֲרֹ֬ךְ לְפָנַ֨י שֻׁלְחָ֗ן נֶ֥גֶד צֹרְרָ֑י דִּשַּׁ֖נְתָּ בַשֶּׁ֥מֶן רֹ֝אשִׁ֗י כּוֹסִ֥י רְוָיָֽה'},
{n:'ו',t:'אַ֤ךְ ט֣וֹב וָחֶ֣סֶד יִ֭רְדְּפוּנִי כׇּל־יְמֵ֣י חַיָּ֑י וְשַׁבְתִּ֥י בְּבֵית־ה֝֗׳ לְאֹ֣רֶךְ יָמִֽים'}
]},
psalms67:{title:'תהלים ס״ז',verses:[
{n:'א',t:'לַמְנַצֵּ֥חַ בִּנְגִינֹ֗ת מִזְמ֥וֹר שִֽׁיר'},
{n:'ב',t:'אֱלֹהִ֗ים יְחׇנֵּ֥נוּ וִֽיבָרְכֵ֑נוּ יָ֤אֵר פָּנָ֖יו אִתָּ֣נוּ סֶֽלָה'},
{n:'ג',t:'לָדַ֣עַת בָּאָ֣רֶץ דַּרְכֶּ֑ךָ בְּכׇל־גּ֝וֹיִ֗ם יְשׁוּעָתֶֽךָ'},
{n:'ד',t:'יוֹד֣וּךָ עַמִּ֣ים אֱלֹהִ֑ים י֝וֹד֗וּךָ עַמִּ֥ים כֻּלָּֽם'},
{n:'ה',t:'יִ֤שְׂמְח֨וּ וִֽירַנְּנ֬וּ לְאֻמִּ֗ים כִּֽי־תִשְׁפֹּ֣ט עַמִּ֣ים מִישֹׁ֑ר וּ֝לְאֻמִּ֗ים בָּאָ֥רֶץ תַּנְחֵ֥ם סֶֽלָה'},
{n:'ו',t:'יוֹד֣וּךָ עַמִּ֣ים אֱלֹהִ֑ים י֝וֹד֗וּךָ עַמִּ֥ים כֻּלָּֽם'},
{n:'ז',t:'אֶ֭רֶץ נָתְנָ֣ה יְבוּלָ֑הּ יְ֝בָרְכֵ֗נוּ אֱלֹהִ֥ים אֱלֹהֵֽינוּ'},
{n:'ח',t:'יְבָרְכֵ֥נוּ אֱלֹהִ֑ים וְיִֽירְא֥וּ אֹ֝ת֗וֹ כׇּל־אַפְסֵי־אָֽרֶץ'}
]},
psalms90:{title:'תהלים צ׳',verses:[
{n:'א',t:'תְּפִלָּה֮ לְמֹשֶׁ֪ה אִישׁ־הָאֱלֹהִ֥ים אֲ֭דֹנָי מָע֣וֹן אַתָּ֣ה הָיִ֥יתָ לָּ֗נוּ בְּדֹ֣ר וָדֹֽר'},
{n:'ב',t:'בְּטֶ֤רֶם הָרִ֨ים יֻלָּ֗דוּ וַתְּח֣וֹלֵל אֶ֣רֶץ וְתֵבֵ֑ל וּמֵעוֹלָ֥ם עַד־ע֝וֹלָ֗ם אַתָּ֥ה אֵֽל'},
{n:'ג',t:'תָּשֵׁ֣ב אֱנ֣וֹשׁ עַד־דַּכָּ֑א וַ֝תֹּ֗אמֶר שׁ֣וּבוּ בְנֵי־אָדָֽם'},
{n:'ד',t:'כִּ֤י אֶ֪לֶף שָׁנִ֡ים בְּעֵינֶ֗יךָ כְּי֣וֹם אֶ֭תְמוֹל כִּ֣י יַעֲבֹ֑ר וְאַשְׁמוּרָ֥ה בַלָּֽיְלָה'},
{n:'ה',t:'זְ֭רַמְתָּם שֵׁנָ֣ה יִהְי֑וּ בַּ֝בֹּ֗קֶר כֶּחָצִ֥יר יַחֲלֹֽף'},
{n:'ו',t:'בַּ֭בֹּקֶר יָצִ֣יץ וְחָלָ֑ף לָ֝עֶ֗רֶב יְמוֹלֵ֥ל וְיָבֵֽשׁ'},
{n:'ז',t:'כִּי־כָלִ֥ינוּ בְאַפֶּ֑ךָ וּ֝בַחֲמָתְךָ֗ נִבְהָֽלְנוּ'},
{n:'ח',t:'שַׁתָּ֣ה עֲוֹנֹתֵ֣ינוּ לְנֶגְדֶּ֑ךָ עֲ֝לֻמֵ֗נוּ לִמְא֥וֹר פָּנֶֽיךָ'},
{n:'ט',t:'כִּ֣י כׇל־יָ֭מֵינוּ פָּנ֣וּ בְעֶבְרָתֶ֑ךָ כִּלִּ֖ינוּ שָׁנֵ֣ינוּ כְמוֹ־הֶֽגֶה'},
{n:'י',t:'יְמֵי־שְׁנוֹתֵ֨ינוּ בָהֶ֥ם שִׁבְעִ֪ים שָׁנָ֡ה וְאִ֤ם בִּגְבוּרֹ֨ת שְׁמוֹנִ֬ים שָׁנָ֗ה וְ֭רׇהְבָּם עָמָ֣ל וָאָ֑וֶן כִּי־גָ֥ז חִ֝֗ישׁ וַנָּעֻֽפָה'},
{n:'יא',t:'מִי־י֭וֹדֵעַ עֹ֣ז אַפֶּ֑ךָ וּ֝כְיִרְאָתְךָ֗ עֶבְרָתֶֽךָ'},
{n:'יב',t:'לִמְנ֣וֹת יָ֭מֵינוּ כֵּ֣ן הוֹדַ֑ע וְ֝נָבִ֗א לְבַ֣ב חׇכְמָֽה'},
{n:'יג',t:'שׁוּבָ֣ה ה֭׳ עַד־מָתָ֑י וְ֝הִנָּחֵ֗ם עַל־עֲבָדֶֽיךָ'},
{n:'יד',t:'שַׂבְּעֵ֣נוּ בַבֹּ֣קֶר חַסְדֶּ֑ךָ וּ֝נְרַנְּנָ֗ה וְנִשְׂמְחָ֥ה בְּכׇל־יָמֵֽינוּ'},
{n:'טו',t:'שַׂ֭מְּחֵנוּ כִּימ֣וֹת עִנִּיתָ֑נוּ שְׁ֝נ֗וֹת רָאִ֥ינוּ רָעָֽה'},
{n:'טז',t:'יֵרָאֶ֣ה אֶל־עֲבָדֶ֣יךָ פׇעֳלֶ֑ךָ וַ֝הֲדָרְךָ֗ עַל־בְּנֵיהֶֽם'},
{n:'יז',t:'וִיהִ֤י נֹ֤עַם אֲדֹנָ֥י אֱלֹהֵ֗ינוּ עָ֫לֵ֥ינוּ וּמַעֲשֵׂ֣ה יָ֭דֵינוּ כּוֹנְנָ֥ה עָלֵ֑ינוּ וּֽמַעֲשֵׂ֥ה יָ֝דֵ֗ינוּ כּוֹנְנֵֽהוּ'}
]},
psalms100:{title:'תהלים ק׳',verses:[
{n:'א',t:'מִזְמ֥וֹר לְתוֹדָ֑ה הָרִ֥יעוּ לַ֝ה֗׳ כׇּל־הָאָֽרֶץ'},
{n:'ב',t:'עִבְד֣וּ אֶת־ה֭׳ בְּשִׂמְחָ֑ה בֹּ֥אוּ לְ֝פָנָ֗יו בִּרְנָנָֽה'},
{n:'ג',t:'דְּע֗וּ כִּי־ה֥׳ ה֣וּא אֱלֹהִ֑ים ה֤וּא עָ֭שָׂנוּ וְל֣וֹ אֲנַ֑חְנוּ עַ֝מּ֗וֹ וְצֹ֣אן מַרְעִיתֽוֹ'},
{n:'ד',t:'בֹּ֤אוּ שְׁעָרָ֨יו בְּתוֹדָ֗ה חֲצֵרֹתָ֥יו בִּתְהִלָּ֑ה ה֥וֹדוּ ל֝֗וֹ בָּרְכ֥וּ שְׁמֽוֹ'},
{n:'ה',t:'כִּי־ט֣וֹב ה֭׳ לְעוֹלָ֣ם חַסְדּ֑וֹ וְעַד־דֹּ֥ר וָ֝דֹ֗ר אֱמוּנָתֽוֹ'}
]},
psalms121:{title:'תהלים קכ״א',verses:[
{n:'א',t:'שִׁ֥יר לַמַּעֲל֑וֹת אֶשָּׂ֣א עֵ֭ינַי אֶל־הֶהָרִ֑ים מֵ֝אַ֗יִן יָבֹ֥א עֶזְרִֽי'},
{n:'ב',t:'עֶ֭זְרִי מֵעִ֣ם ה֑׳ עֹ֝שֵׂ֗ה שָׁמַ֥יִם וָאָֽרֶץ'},
{n:'ג',t:'אַל־יִתֵּ֣ן לַמּ֣וֹט רַגְלֶ֑ךָ אַל־יָ֝נ֗וּם שֹׁמְרֶֽךָ'},
{n:'ד',t:'הִנֵּ֣ה לֹ֣א יָנ֣וּם וְלֹ֣א יִישָׁ֑ן שׁ֝וֹמֵ֗ר יִשְׂרָאֵֽל'},
{n:'ה',t:'ה֥׳ שֹׁמְרֶ֑ךָ ה֥׳ צִ֝לְּךָ֗ עַל־יַ֥ד יְמִינֶֽךָ'},
{n:'ו',t:'יוֹמָ֗ם הַשֶּׁ֥מֶשׁ לֹא־יַכֶּ֑כָּה וְ֝יָרֵ֗חַ בַּלָּֽיְלָה'},
{n:'ז',t:'ה֭׳ יִשְׁמׇרְךָ֣ מִכׇּל־רָ֑ע יִ֝שְׁמֹ֗ר אֶת־נַפְשֶֽׁךָ'},
{n:'ח',t:'ה֭׳ יִשְׁמׇר־צֵאתְךָ֣ וּבוֹאֶ֑ךָ מֵ֝עַתָּ֗ה וְעַד־עוֹלָֽם'}
]},
psalms131:{title:'תהלים קל״א',verses:[
{n:'א',t:'שִׁ֥יר הַמַּעֲל֗וֹת לְדָוִ֫ד ה֥׳ לֹא־גָבַ֣הּ לִ֭בִּי וְלֹא־רָמ֣וּ עֵינַ֑י וְלֹא־הִלַּ֓כְתִּי בִּגְדֹל֖וֹת וּבְנִפְלָא֣וֹת מִמֶּֽנִּי'},
{n:'ב',t:'אִם־לֹ֤א שִׁוִּ֨יתִי וְדוֹמַ֗מְתִּי נַ֭פְשִׁי כְּגָמֻ֣ל עֲלֵ֣י אִמּ֑וֹ כַּ֝גָּמֻ֗ל עָלַ֥י נַפְשִֽׁי'},
{n:'ג',t:'יַחֵ֣ל יִ֭שְׂרָאֵל אֶל־ה֑׳ מֵ֝עַתָּ֗ה וְעַד־עוֹלָֽם'}
]},
genesis1:{title:'בראשית א׳ (א-יג)',verses:[
{n:'א',t:'בְּרֵאשִׁ֖ית בָּרָ֣א אֱלֹהִ֑ים אֵ֥ת הַשָּׁמַ֖יִם וְאֵ֥ת הָאָֽרֶץ'},
{n:'ב',t:'וְהָאָ֗רֶץ הָיְתָ֥ה תֹ֨הוּ֙ וָבֹ֔הוּ וְחֹ֖שֶׁךְ עַל־פְּנֵ֣י תְה֑וֹם וְר֣וּחַ אֱלֹהִ֔ים מְרַחֶ֖פֶת עַל־פְּנֵ֥י הַמָּֽיִם'},
{n:'ג',t:'וַיֹּ֥אמֶר אֱלֹהִ֖ים יְהִ֣י א֑וֹר וַֽיְהִי־אֽוֹר'},
{n:'ד',t:'וַיַּ֧רְא אֱלֹהִ֛ים אֶת־הָא֖וֹר כִּי־ט֑וֹב וַיַּבְדֵּ֣ל אֱלֹהִ֔ים בֵּ֥ין הָא֖וֹר וּבֵ֥ין הַחֹֽשֶׁךְ'},
{n:'ה',t:'וַיִּקְרָ֨א אֱלֹהִ֤ים לָאוֹר֙ י֔וֹם וְלַחֹ֖שֶׁךְ קָ֣רָא לָ֑יְלָה וַֽיְהִי־עֶ֥רֶב וַֽיְהִי־בֹ֖קֶר י֥וֹם אֶחָֽד'},
{n:'ו',t:'וַיֹּ֣אמֶר אֱלֹהִ֔ים יְהִ֥י רָקִ֖יעַ בְּת֣וֹךְ הַמָּ֑יִם וִיהִ֣י מַבְדִּ֔יל בֵּ֥ין מַ֖יִם לָמָֽיִם'},
{n:'ז',t:'וַיַּ֣עַשׂ אֱלֹהִים֮ אֶת־הָרָקִ֒יעַ֒ וַיַּבְדֵּ֗ל בֵּ֤ין הַמַּ֨יִם֙ אֲשֶׁר֙ מִתַּ֣חַת לָרָקִ֔יעַ וּבֵ֣ין הַמַּ֔יִם אֲשֶׁ֖ר מֵעַ֣ל לָרָקִ֑יעַ וַֽיְהִי־כֵֽן'},
{n:'ח',t:'וַיִּקְרָ֧א אֱלֹהִ֛ים לָרָקִ֖יעַ שָׁמָ֑יִם וַֽיְהִי־עֶ֥רֶב וַֽיְהִי־בֹ֖קֶר י֥וֹם שֵׁנִֽי'},
{n:'ט',t:'וַיֹּ֣אמֶר אֱלֹהִ֗ים יִקָּו֨וּ הַמַּ֜יִם מִתַּ֤חַת הַשָּׁמַ֨יִם֙ אֶל־מָק֣וֹם אֶחָ֔ד וְתֵרָאֶ֖ה הַיַּבָּשָׁ֑ה וַֽיְהִי־כֵֽן'},
{n:'י',t:'וַיִּקְרָ֨א אֱלֹהִ֤ים לַיַּבָּשָׁה֙ אֶ֔רֶץ וּלְמִקְוֵ֥ה הַמַּ֖יִם קָרָ֣א יַמִּ֑ים וַיַּ֥רְא אֱלֹהִ֖ים כִּי־טֽוֹב'},
{n:'יא',t:'וַיֹּ֣אמֶר אֱלֹהִ֗ים תַּֽדְשֵׁ֤א הָאָ֨רֶץ֙ דֶּ֔שֶׁא עֵ֚שֶׂב מַזְרִ֣יעַ זֶ֔רַע עֵ֣ץ פְּרִ֞י עֹ֤שֶׂה פְּרִי֙ לְמִינ֔וֹ אֲשֶׁ֥ר זַרְעוֹ־ב֖וֹ עַל־הָאָ֑רֶץ וַֽיְהִי־כֵֽן'},
{n:'יב',t:'וַתּוֹצֵ֨א הָאָ֜רֶץ דֶּ֠שֶׁא עֵ֣שֶׂב מַזְרִ֤יעַ זֶ֨רַע֙ לְמִינֵ֔הוּ וְעֵ֧ץ עֹ֥שֶׂה פְּרִ֛י אֲשֶׁ֥ר זַרְעוֹ־ב֖וֹ לְמִינֵ֑הוּ וַיַּ֥רְא אֱלֹהִ֖ים כִּי־טֽוֹב'},
{n:'יג',t:'וַֽיְהִי־עֶ֥רֶב וַֽיְהִי־בֹ֖קֶר י֥וֹם שְׁלִישִֽׁי'}
]},
devarim6:{title:'דברים ו׳ (שמע)',verses:[
{n:'ד',t:'שְׁמַ֖ע יִשְׂרָאֵ֑ל ה֥׳ אֱלֹהֵ֖ינוּ ה֥׳ אֶחָֽד'},
{n:'ה',t:'וְאָ֣הַבְתָּ֔ אֵ֖ת ה֣׳ אֱלֹהֶ֑יךָ בְּכׇל־לְבָבְךָ֥ וּבְכׇל־נַפְשְׁךָ֖ וּבְכׇל־מְאֹדֶֽךָ'},
{n:'ו',t:'וְהָי֞וּ הַדְּבָרִ֣ים הָאֵ֗לֶּה אֲשֶׁ֨ר אָנֹכִ֧י מְצַוְּךָ֛ הַיּ֖וֹם עַל־לְבָבֶֽךָ'},
{n:'ז',t:'וְשִׁנַּנְתָּ֣ם לְבָנֶ֔יךָ וְדִבַּרְתָּ֖ בָּ֑ם בְּשִׁבְתְּךָ֤ בְּבֵיתֶ֨ךָ֙ וּבְלֶכְתְּךָ֣ בַדֶּ֔רֶךְ וּֽבְשׇׁכְבְּךָ֖ וּבְקוּמֶֽךָ'},
{n:'ח',t:'וּקְשַׁרְתָּ֥ם לְא֖וֹת עַל־יָדֶ֑ךָ וְהָי֥וּ לְטֹטָפֹ֖ת בֵּ֥ין עֵינֶֽיךָ'},
{n:'ט',t:'וּכְתַבְתָּ֛ם עַל־מְזוּזֹ֥ת בֵּיתֶ֖ךָ וּבִשְׁעָרֶֽיךָ'}
]},
isaiah2:{title:'ישעיהו ב׳ (א-ה)',verses:[
{n:'א',t:'הַדָּבָ֛ר אֲשֶׁר־חָזָ֥ה יְשַׁעְיָ֖הוּ בֶּן־אָמ֑וֹץ עַל־יְהוּדָ֖ה וִירוּשָׁלָֽ͏ִם'},
{n:'ב',t:'וְהָיָ֣ה בְּאַחֲרִ֣ית הַיָּמִ֗ים נָכ֨וֹן יִהְיֶ֜ה הַ֤ר בֵּית־ה֙׳ בְּרֹ֣אשׁ הֶהָרִ֔ים וְנִשָּׂ֖א מִגְּבָע֑וֹת וְנָהֲר֥וּ אֵלָ֖יו כׇּל־הַגּוֹיִֽם'},
{n:'ג',t:'וְֽהָלְכ֞וּ עַמִּ֣ים רַבִּ֗ים וְאָמְרוּ֙ לְכ֣וּ וְנַעֲלֶ֗ה אֶל־הַ֤ר ה׳ אֶל־בֵּית֙ אֱלֹהֵ֣י יַעֲקֹ֔ב וְיֹרֵ֨נוּ֙ מִדְּרָכָ֔יו וְנֵלְכָ֖ה בְּאֹרְחֹתָ֑יו כִּ֤י מִצִּיּוֹן֙ תֵּצֵ֣א תוֹרָ֔ה וּדְבַר־ה֖׳ מִירוּשָׁלָֽ͏ִם'},
{n:'ד',t:'וְשָׁפַט֙ בֵּ֣ין הַגּוֹיִ֔ם וְהוֹכִ֖יחַ לְעַמִּ֣ים רַבִּ֑ים וְכִתְּת֨וּ חַרְבוֹתָ֜ם לְאִתִּ֗ים וַחֲנִיתֽוֹתֵיהֶם֙ לְמַזְמֵר֔וֹת לֹא־יִשָּׂ֨א ג֤וֹי אֶל־גּוֹי֙ חֶ֔רֶב וְלֹא־יִלְמְד֥וּ ע֖וֹד מִלְחָמָֽה'},
{n:'ה',t:'בֵּ֖ית יַעֲקֹ֑ב לְכ֥וּ וְנֵלְכָ֖ה בְּא֥וֹר ה֥׳'}
]},
jonah1:{title:'יונה א׳',verses:[
{n:'א',t:'וַֽיְהִי֙ דְּבַר־ה֔׳ אֶל־יוֹנָ֥ה בֶן־אֲמִתַּ֖י לֵאמֹֽר'},
{n:'ב',t:'ק֠וּם לֵ֧ךְ אֶל־נִֽינְוֵ֛ה הָעִ֥יר הַגְּדוֹלָ֖ה וּקְרָ֣א עָלֶ֑יהָ כִּֽי־עָלְתָ֥ה רָעָתָ֖ם לְפָנָֽי'},
{n:'ג',t:'וַיָּ֤קׇם יוֹנָה֙ לִבְרֹ֣חַ תַּרְשִׁ֔ישָׁה מִלִּפְנֵ֖י ה֑׳ וַיֵּ֨רֶד יָפ֜וֹ וַיִּמְצָ֣א אֳנִיָּ֗ה בָּאָ֤ה תַרְשִׁישׁ֙ וַיִּתֵּ֣ן שְׂכָרָ֔הּ וַיֵּ֤רֶד בָּהּ֙ לָב֤וֹא עִמָּהֶם֙ תַּרְשִׁ֔ישָׁה מִלִּפְנֵ֖י ה֥׳'},
{n:'ד',t:'וַה֗׳ הֵטִ֤יל רֽוּחַ־גְּדוֹלָה֙ אֶל־הַיָּ֔ם וַיְהִ֥י סַֽעַר־גָּד֖וֹל בַּיָּ֑ם וְהָאֳנִיָּ֖ה חִשְּׁבָ֥ה לְהִשָּׁבֵֽר'},
{n:'ה',t:'וַיִּֽירְא֣וּ הַמַּלָּחִ֗ים וַֽיִּזְעֲקוּ֮ אִ֣ישׁ אֶל־אֱלֹהָיו֒ וַיָּטִ֨לוּ אֶת־הַכֵּלִ֜ים אֲשֶׁ֤ר בָּאֳנִיָּה֙ אֶל־הַיָּ֔ם לְהָקֵ֖ל מֵֽעֲלֵיהֶ֑ם וְיוֹנָ֗ה יָרַד֙ אֶל־יַרְכְּתֵ֣י הַסְּפִינָ֔ה וַיִּשְׁכַּ֖ב וַיֵּרָדַֽם'},
{n:'ו',t:'וַיִּקְרַ֤ב אֵלָיו֙ רַ֣ב הַחֹבֵ֔ל וַיֹּ֥אמֶר ל֖וֹ מַה־לְּךָ֣ נִרְדָּ֑ם ק֚וּם קְרָ֣א אֶל־אֱלֹהֶ֔יךָ אוּלַ֞י יִתְעַשֵּׁ֧ת הָאֱלֹהִ֛ים לָ֖נוּ וְלֹ֥א נֹאבֵֽד'}
]},
kohelet1:{title:'קהלת א׳ (א-יא)',verses:[
{n:'א',t:'דִּבְרֵ֣י קֹהֶ֔לֶת בֶּן־דָּוִ֖ד מֶ֥לֶךְ בִּירוּשָׁלָֽ͏ִם'},
{n:'ב',t:'הֲבֵ֤ל הֲבָלִים֙ אָמַ֣ר קֹהֶ֔לֶת הֲבֵ֥ל הֲבָלִ֖ים הַכֹּ֥ל הָֽבֶל'},
{n:'ג',t:'מַה־יִּתְר֖וֹן לָֽאָדָ֑ם בְּכׇל־עֲמָל֔וֹ שֶֽׁיַּעֲמֹ֖ל תַּ֥חַת הַשָּֽׁמֶשׁ'},
{n:'ד',t:'דּ֤וֹר הֹלֵךְ֙ וְד֣וֹר בָּ֔א וְהָאָ֖רֶץ לְעוֹלָ֥ם עֹמָֽדֶת'},
{n:'ה',t:'וְזָרַ֥ח הַשֶּׁ֖מֶשׁ וּבָ֣א הַשָּׁ֑מֶשׁ וְאֶ֨ל־מְקוֹמ֔וֹ שׁוֹאֵ֛ף זוֹרֵ֥חַ ה֖וּא שָֽׁם'},
{n:'ו',t:'הוֹלֵךְ֙ אֶל־דָּר֔וֹם וְסוֹבֵ֖ב אֶל־צָפ֑וֹן סוֹבֵ֤ב סֹבֵב֙ הוֹלֵ֣ךְ הָר֔וּחַ וְעַל־סְבִיבֹתָ֖יו שָׁ֥ב הָרֽוּחַ'},
{n:'ז',t:'כׇּל־הַנְּחָלִ֣ים הֹלְכִ֣ים אֶל־הַיָּ֗ם וְהַיָּם֙ אֵינֶ֣נּוּ מָלֵ֔א אֶל־מְק֗וֹם שֶׁ֤הַנְּחָלִים֙ הֹלְכִ֔ים שָׁ֖ם הֵ֥ם שָׁבִ֖ים לָלָֽכֶת'},
{n:'ח',t:'כׇּל־הַדְּבָרִ֣ים יְגֵעִ֔ים לֹא־יוּכַ֥ל אִ֖ישׁ לְדַבֵּ֑ר לֹא־תִשְׂבַּ֥ע עַ֨יִן֙ לִרְא֔וֹת וְלֹא־תִמָּלֵ֥א אֹ֖זֶן מִשְּׁמֹֽעַ'},
{n:'ט',t:'מַה־שֶּׁהָיָה֙ ה֣וּא שֶׁיִּהְיֶ֔ה וּמַה־שֶׁנַּעֲשָׂ֖ה ה֣וּא שֶׁיֵּעָשֶׂ֑ה וְאֵ֥ין כׇּל־חָדָ֖שׁ תַּ֥חַת הַשָּֽׁמֶשׁ'},
{n:'י',t:'יֵ֥שׁ דָּבָ֛ר שֶׁיֹּאמַ֥ר רְאֵה־זֶ֖ה חָדָ֣שׁ ה֑וּא כְּבָר֙ הָיָ֣ה לְעֹֽלָמִ֔ים אֲשֶׁ֥ר הָיָ֖ה מִלְּפָנֵֽנוּ'},
{n:'יא',t:'אֵ֥ין זִכְר֖וֹן לָרִאשֹׁנִ֑ים וְגַ֨ם לָאַחֲרֹנִ֜ים שֶׁיִּהְי֗וּ לֹא־יִהְיֶ֤ה לָהֶם֙ זִכָּר֔וֹן עִ֥ם שֶׁיִּהְי֖וּ לָאַחֲרֹנָֽה'}
]}};

function doUndo(){

  redoStack.push(JSON.stringify({brks:S.brks,indents:S.indents,paraBreaks:S.paraBreaks,marks:S.marks,pkgs:S.pkgs,cats:S.cats,conns:S.conns,nodes:S.nodes}));

  S.conns=prev.conns||[];S.nodes=prev.nodes||[];

function buildLines(){
  const lines=[];
  D().verses.forEach((v,vi)=>{
    let currentLine=[];
    const words=v.t.split(/\s+/);
    words.forEach((w,wi)=>{
      currentLine.push({w,vi,wi,k:`${vi}-${wi}`});
      if(S.brks[`${vi}-${wi}`]){
        lines.push({words:currentLine,startVi:vi,lineKey:`${vi}-${wi}-l`});
        currentLine=[];
      }
    });
    if(currentLine.length) lines.push({words:currentLine,startVi:vi,lineKey:`${vi}-last-l`});
    if(S.paraBreaks[vi]) lines.push({isPara:true,afterVi:vi});
  });
  return lines;
}

// ===== AUTO-DETECT REPEATING WORDS =====
function stripDiacritics(w){
  // Remove niqqud (U+0591-U+05BD, U+05BF-U+05C7) and maqaf
  return w.replace(/[\u0591-\u05BD\u05BF-\u05C7\u05F3\u05F4]/g,'').replace(/־/g,'');
}
function detectRepeatingWords(){
  const verses=D().verses;
  const wordMap={};// stripped -> [{vi,wi,original}]
  verses.forEach((v,vi)=>{
    const words=v.t.split(/\s+/);
    words.forEach((w,wi)=>{
      const stripped=stripDiacritics(w);
      if(stripped.length<2)return;// skip single-letter words like ו
      // Also skip common function words
      const common=['את','אל','על','גם','כי','לא','אם','כל','עד','מן','הם','הן','לו','בו','זה','מה','אף'];
      if(common.includes(stripped))return;
      if(!wordMap[stripped])wordMap[stripped]=[];
      wordMap[stripped].push({vi,wi,original:w});
    });
  });
  // Filter to words that appear 2+ times
  const groups=[];
  Object.entries(wordMap).forEach(([stripped,occurrences])=>{
    if(occurrences.length>=S.autoDetectMinCount){
      groups.push({word:stripped,occurrences,count:occurrences.length});
    }
  });
  groups.sort((a,b)=>b.count-a.count);
  return groups;
}
function detectRepeatingPairs(){
  const verses=D().verses;
  const pairMap={};
  verses.forEach((v,vi)=>{
    const words=v.t.split(/\s+/);
    for(let wi=0;wi<words.length-1;wi++){
      const a=stripDiacritics(words[wi]);
      const b=stripDiacritics(words[wi+1]);
      if(a.length<2||b.length<2)continue;
      const key=a+' '+b;
      if(!pairMap[key])pairMap[key]=[];
      pairMap[key].push({vi,wi,vi2:vi,wi2:wi+1});
    }
  });
  const pairs=[];
  Object.entries(pairMap).forEach(([pair,occurrences])=>{
    if(occurrences.length>=2){
      pairs.push({pair,occurrences,count:occurrences.length});
    }
  });
  pairs.sort((a,b)=>b.count-a.count);
  return pairs;
}
function runAutoDetect(){
  S.detectedGroups=detectRepeatingWords();
  S.detectedPairs=detectRepeatingPairs();
  S.autoDetect=true;
  R();
}
function autoMarkGroup(groupIdx){
  const g=S.detectedGroups[groupIdx];
  if(!g)return;
  saveUndo();
  // Find or create a category for this word
  const ci=groupIdx%C.length;
  const catId='auto_'+Date.now()+'_'+groupIdx;
  const newCat={id:catId,name:g.word,ci:ci,styleId:'highlight',subs:[{id:'s0',name:g.word,ci:ci}]};
  S.cats.push(newCat);
  S.activeCat=S.cats.length-1;
  S.activeSub=0;
  // Mark all occurrences
  g.occurrences.forEach(occ=>{
    const k=`${occ.vi}-${occ.wi}`;
    S.marks[k]={catId:catId,subId:'s0'};
  });
  R();
  toast(`סומנו ${g.count} מופעים של "${g.word}"`);
}
function autoMarkPair(pairIdx){
  const p=S.detectedPairs[pairIdx];
  if(!p)return;
  saveUndo();
  const ci=pairIdx%C.length;
  const catId='autop_'+Date.now()+'_'+pairIdx;
  const newCat={id:catId,name:p.pair,ci:ci,styleId:'underline',subs:[{id:'s0',name:p.pair,ci:ci}]};
  S.cats.push(newCat);
  S.activeCat=S.cats.length-1;
  S.activeSub=0;
  p.occurrences.forEach(occ=>{
    const k1=`${occ.vi}-${occ.wi}`;
    const k2=`${occ.vi2}-${occ.wi2}`;
    S.marks[k1]={catId:catId,subId:'s0'};
    S.marks[k2]={catId:catId,subId:'s0'};
  });
  R();
  toast(`סומנו ${p.count} מופעים של "${p.pair}"`);
}

function stepHasWork(idx){
  if(idx===0)return Object.keys(S.brks).length>0||Object.keys(S.indents).length>0||Object.keys(S.paraBreaks).length>0;
  if(idx===1)return Object.keys(S.marks).length>0;
  if(idx===2)return S.pkgs.length>0;
  if(idx===3)return S.nodes.length>0||(S.stickies&&S.stickies.length>0)||(S.labels&&S.labels.length>0)||(S.shapes&&S.shapes.length>0);
  if(idx===4)return !!(S.notes&&Object.values(S.notes).some(n=>n&&n.trim()));
  return false;
}

      • <b>Enter ↵</b> — שבירת שורה לפני המילה הנבחרת<br>
      • <b>Tab →</b> — הזחה ימינה (כמו רווח)<br>
      • <b>Shift+Tab ←</b> — הזחה חזרה שמאלה<br>
      • <b>פסקה חדשה</b> — הפרדה לפסקאות לפי נושאים<br>
      • <b>Ctrl+Z</b> — ביטול | <b>Ctrl+Y</b> — שחזור
    </div>
    <div class="sb-sub">גודל טקסט</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="sb-btn sb-btn-out sb-btn-sm" onclick="S.fs=Math.max(16,S.fs-2);R()">−</div>
      <div style="flex:1;text-align:center;font-size:18px;font-weight:800;color:${tc()}">${S.fs}</div>
      <div class="sb-btn sb-btn-out sb-btn-sm" onclick="S.fs=Math.min(36,S.fs+2);R()">+</div>
    </div>
    <div class="sb-sub">רווח שורות</div>
    <input type="range" min="1.2" max="2.4" step=".1" value="${S.lh}" oninput="S.lh=+this.value;R()" style="width:100%;accent-color:${cv('#FF8C69','#FF8C69')};margin-bottom:8px">
    <div style="display:flex;gap:6px;margin:8px 0">
      <div class="sb-btn sb-btn-out sb-btn-sm" style="flex:1" onclick="S.brks={};S.indents={};S.paraBreaks={};R();toast('עימוד נוקה')">נקה הכל</div>
    </div>
    <div class="sb-btn sb-btn-blue" onclick="S.step=1;R()">המשך לגילוי →</div>`;
}

function sDisc(){
  const cat=S.cats[S.activeCat];
  const cntMap={};
  S.cats.forEach(c=>cntMap[c.id]=0);
  Object.values(S.marks).forEach(m=>{if(cntMap[m.catId]!==undefined)cntMap[m.catId]++});
  const totalMarks=Object.keys(S.marks).length;
  let html=`<div class="sb-title">גילוי וסימון</div>`;
  html+=`<div style="background:${cv('rgba(255,140,105,.08)','rgba(255,140,105,.12)')};border-radius:10px;padding:10px 12px;margin-bottom:10px;border:1.5px solid ${cv('rgba(255,140,105,.25)','rgba(255,140,105,.2)')};font-size:12px;line-height:1.6">
    <b>🖍️ איך מתחילים?</b> בחר צבע למטה → לחץ על מילים בטקסט → זהו!
  </div>`;
  html+=`<div class="info-box" onclick="S.showDiscInfo=!S.showDiscInfo;R()">
    <b>למה גילוי?</b> ${S.showDiscInfo?'▲':'▼'}
    <div class="info-expand ${S.showDiscInfo?'open':''}">
      <div style="margin-top:6px">
      שלב הגילוי הוא שלב של <b>צביעה וסימון</b> — הכלי המרכזי לחשיפת תופעות ספרותיות בטקסט.<br><br>
      <b>כלל הזהב:</b> אותו סוג תופעה = אותו סגנון סימון.
      </div>
    </div>
  </div>`;

  // ===== QUICK MARK PALETTE =====
  html+=`<div style="background:${cv('rgba(207,226,243,.12)','rgba(74,106,138,.12)')};border-radius:12px;padding:12px;margin-bottom:12px;border:1.5px solid ${cv('#CFE2F3','#4A6A8A')}">
    <div style="font-size:12px;font-weight:700;margin-bottom:8px">🎨 בחר צבע ולחץ על מילים בטקסט</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">
      ${C.map((c,i)=>{
        const isActive=cat&&cat.ci===i&&S.cats.length>0;
        return `<div style="width:32px;height:32px;border-radius:10px;cursor:pointer;background:${c.b};border:2.5px solid ${isActive?c.c:'transparent'};transition:all .2s;box-shadow:${isActive?'0 2px 8px '+c.c+'55':'0 1px 3px rgba(0,0,0,.08)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${c.c}" onclick="quickMark(${i})" title="סמן בצבע הזה">${isActive?'✓':''}</div>`;
      }).join('')}
    </div>
    ${cat?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">
      ${STYLES.map(s=>`<div class="tb-btn ${cat.styleId===s.id?'active':''}" style="font-size:10px;padding:3px 7px" onclick="changeCatStyle(${S.activeCat},'${s.id}')">${s.icon} ${s.name}</div>`).join('')}
    </div>
    <div style="font-size:11px;color:${tcm()};margin-top:4px">תצוגה מקדימה: <span class="style-preview" style="${getStyleById(cat.styleId).apply(C[cat.ci]||C[0])}">דוגמה</span></div>`
    :'<div style="font-size:11px;color:'+tcm()+'">👆 לחץ על צבע כדי להתחיל</div>'}
  </div>`;

  // ===== CATEGORIES LIST =====
  if(S.cats.length>0){
    html+=`<div class="sb-sub">קטגוריות (${S.cats.length})</div>`;
    S.cats.forEach((c,i)=>{
      const style=getStyleById(c.styleId);const col=C[c.ci];const cnt=cntMap[c.id]||0;
      html+=`<div class="cat-card ${S.activeCat===i?'a':''}" onclick="S.activeCat=${i};S.activeSub=0;R()">
        <div class="cat-swatch" style="${style.apply(col)}background:${col.b};border-color:${col.c}"></div>
        <div style="flex:1;min-width:0">
          <input type="text" value="${c.name}" onclick="event.stopPropagation()" onchange="S.cats[${i}].name=this.value.trim()||'קטגוריה';R()" style="border:none;background:transparent;font-size:12px;font-weight:700;font-family:'Heebo';color:${tc()};outline:none;padding:0;min-width:0;direction:rtl;width:100%">
        </div>
        <span class="cat-cnt">${cnt}</span>
        <span style="cursor:pointer;color:${cv('#ef4444','#FF8C69')};font-size:15px;padding:0 2px;opacity:.5;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5" onclick="event.stopPropagation();deleteCat(${i})" title="מחק קטגוריה">×</span>
      </div>`;
    });
  }

  // ===== ADVANCED: Sub-groups (hidden behind toggle) =====
  if(cat){
    ensureSubs(cat);
    const style=getStyleById(cat.styleId);
    const hasMutlipleSubs=cat.subs.length>1;
    html+=`<div style="margin-top:8px">
      <div style="font-size:10px;color:${tcm()};cursor:pointer;display:flex;align-items:center;gap:4px;opacity:.6;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.6" onclick="S.showNewSub=!S.showNewSub;R()">⚙️ ${hasMutlipleSubs?`תתי-קבוצות (${cat.subs.length})`:' הגדרות מתקדמות'} ${S.showNewSub?'▲':'▼'}</div>`;
    if(S.showNewSub){
      html+=cat.subs.map((sub,si)=>{
        const subCol=C[sub.ci]||C[0];const isActive=S.activeSub===si;
        const subCnt=Object.values(S.marks).filter(m=>m.catId===cat.id&&m.subId===sub.id).length;
        return `<div style="display:flex;align-items:center;gap:6px;padding:5px 7px;margin-bottom:3px;border-radius:8px;border:1.5px solid ${isActive?subCol.c:brd()};background:${isActive?subCol.b:cv('transparent','transparent')};cursor:pointer;transition:all .15s;font-size:11px;margin-top:4px" onclick="S.activeSub=${si};R()">
          <div style="width:16px;height:12px;border-radius:3px;flex-shrink:0;${style.apply(subCol)}"></div>
          <input type="text" value="${sub.name}" onclick="event.stopPropagation()" onchange="renameSub(${S.activeCat},${si},this.value)" style="flex:1;border:none;background:transparent;font-size:11px;font-weight:${isActive?'700':'500'};font-family:'Heebo';color:${tc()};outline:none;padding:0;min-width:0;direction:rtl">
          <span style="font-size:9px;color:${tcm()}">(${subCnt})</span>
          ${cat.subs.length>1?`<span style="cursor:pointer;color:${cv('#ef4444','#FF8C69')};font-size:13px" onclick="event.stopPropagation();delSub(${S.activeCat},${si})">×</span>`:''}
        </div>`;
      }).join('');
      html+=`<div style="display:flex;gap:4px;margin-top:4px"><div class="sb-btn sb-btn-out sb-btn-sm" style="font-size:10px;padding:4px 8px" onclick="addSub(${S.activeCat})">＋ תת-קבוצה</div></div>`;
    }
    html+=`</div>`;
  }

  // ===== LEGEND =====
  if(totalMarks>0){
    html+=`<div class="legend" style="margin-top:12px"><div class="legend-title">מקרא (${totalMarks} סימונים)</div>`;
    html+=`<div class="legend-item ${S.vf==='all'?'active':''}" onclick="S.vf='all';R()">
      <div style="width:20px;height:14px;background:linear-gradient(135deg,#fce7f3,#dbeafe,#dcfce7);border-radius:4px"></div><span>הצג הכל</span></div>`;
    S.cats.forEach(c=>{
      const style=getStyleById(c.styleId);
      ensureSubs(c);
      c.subs.forEach(sub=>{
        const col=C[sub.ci]||C[0];
        const cnt=Object.values(S.marks).filter(m=>m.catId===c.id&&m.subId===sub.id).length;
        if(cnt===0)return;
        const fKey=c.id+'__'+sub.id;
        const isActive=S.vf===fKey;const isDimmed=S.vf!=='all'&&!isActive;
        html+=`<div class="legend-item ${isActive?'active':''} ${isDimmed?'dimmed':''}" onclick="S.vf=S.vf==='${fKey}'?'all':'${fKey}';R()">
          <div class="legend-swatch" style="${style.apply(col)}"></div>
          <span style="font-size:11px">${sub.name}</span><span style="font-size:9px;color:${tcm()}">${c.name}</span><span style="font-size:10px;color:${tcm()};margin-right:auto">(${cnt})</span></div>`;
      });
    });
    html+=`</div>`;
  }

  // ===== AUTO-DETECT REPEATING WORDS =====
  html+=`<div style="margin-top:12px;border-top:1.5px solid ${brd()};padding-top:12px">
    <div style="font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px" onclick="S.showAutoDetect=!S.showAutoDetect;R()">
      🔍 זיהוי אוטומטי של מילים חוזרות ${S.showAutoDetect?'▲':'▼'}
    </div>`;
  if(S.showAutoDetect){
    html+=`<div style="font-size:11px;color:${tcm()};margin:6px 0 8px">
      האפליקציה תזהה מילים וצירופים שחוזרים בטקסט — כלי חשוב לגילוי תופעות ספרותיות.
    </div>
    <div class="sb-btn sb-btn-out sb-btn-sm" style="margin-bottom:10px" onclick="runAutoDetect()">🔍 סרוק מילים חוזרות</div>`;
    if(S.autoDetect&&S.detectedGroups.length>0){
      html+=`<div class="sb-sub">מילים חוזרות (${S.detectedGroups.length})</div>`;
      html+=`<div style="max-height:200px;overflow-y:auto;margin-bottom:8px">`;
      S.detectedGroups.slice(0,30).forEach((g,i)=>{
        const col=C[i%C.length];
        html+=`<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;margin-bottom:3px;border-radius:8px;border:1px solid ${brd()};font-size:12px;cursor:pointer;transition:all .15s;background:${cv('transparent','transparent')}" onmouseover="this.style.background='${hov()}'" onmouseout="this.style.background='transparent'">
          <span style="font-weight:700;font-family:${fontCSS()};color:${tc()};flex:1">${g.word}</span>
          <span style="font-size:10px;color:${tcm()};min-width:24px;text-align:center;background:${col.b};border-radius:10px;padding:1px 6px;color:${col.c};font-weight:600">${g.count}×</span>
          <span style="font-size:10px;cursor:pointer;color:${cv('#2563eb','#6ea8fe')};white-space:nowrap" onclick="autoMarkGroup(${i})">סמן</span>
        </div>`;
      });
      html+=`</div>`;
    }
    if(S.autoDetect&&S.detectedPairs.length>0){
      html+=`<div class="sb-sub">צירופי מילים חוזרים (${S.detectedPairs.length})</div>`;
      html+=`<div style="max-height:200px;overflow-y:auto;margin-bottom:8px">`;
      S.detectedPairs.slice(0,20).forEach((p,i)=>{
        const col=C[(i+5)%C.length];
        html+=`<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;margin-bottom:3px;border-radius:8px;border:1px solid ${brd()};font-size:12px;cursor:pointer;transition:all .15s;background:${cv('transparent','transparent')}" onmouseover="this.style.background='${hov()}'" onmouseout="this.style.background='transparent'">
          <span style="font-weight:700;font-family:${fontCSS()};color:${tc()};flex:1">${p.pair}</span>
          <span style="font-size:10px;color:${tcm()};min-width:24px;text-align:center;background:${col.b};border-radius:10px;padding:1px 6px;color:${col.c};font-weight:600">${p.count}×</span>
          <span style="font-size:10px;cursor:pointer;color:${cv('#2563eb','#6ea8fe')};white-space:nowrap" onclick="autoMarkPair(${i})">סמן</span>
        </div>`;
      });
      html+=`</div>`;
    }
    if(S.autoDetect&&S.detectedGroups.length===0){
      html+=`<div style="font-size:11px;color:${tcm()};text-align:center;padding:8px">לא נמצאו מילים חוזרות בטקסט זה</div>`;
    }
  }
  html+=`</div>`;

  html+=`<div style="display:flex;gap:6px;margin:10px 0">
    ${totalMarks>0?`<div class="sb-btn sb-btn-out sb-btn-sm" style="flex:1" onclick="if(confirm('לנקות את כל ${totalMarks} הסימונים?')){saveUndo();S.marks={};R();toast('סימונים נוקו')}">נקה סימונים</div>`:''}
  </div>
  <div class="sb-btn sb-btn-green" onclick="S.step=2;R()">המשך לאריזה →</div>`;
  return html;
}

function sPkg(){
  return `
    <div class="sb-title">אריזה</div>

      </div>

    <label style="font-size:11px;color:${tcm()};display:block;margin-bottom:4px">צבע</label>
    <div class="pal" id="pkgNewPal">
      ${C.map((col,i)=>`<div class="pal-c" style="background:${col.c}" data-ci="${i}" onclick="S.pkgNewCi=${i};document.querySelectorAll('#pkgNewPal .pal-c').forEach(el=>el.classList.remove('a'));this.classList.add('a');R()" ${S.pkgNewCi===i?'class="a"':''}></div>`).join('')}

    <div class="style-tgl">
      <div class="style-opt ${S.pkgNewStyle==='fill'?'a':''}" onclick="S.pkgNewStyle='fill';R()">רקע מלא</div>
      <div class="style-opt ${S.pkgNewStyle==='subtle'?'a':''}" onclick="S.pkgNewStyle='subtle';R()">רקע עדין</div>
      <div class="style-opt ${S.pkgNewStyle==='border'?'a':''}" onclick="S.pkgNewStyle='border';R()">מסגרת</div>
    </div>
    <div style="font-size:11px;color:${tcm()};margin-bottom:8px">מילים נבחרות: ${S.pkgSel.length}</div>
    <button class="sb-btn sb-btn-green" onclick="mkPkg()" ${!S.pkgNewName||!S.pkgSel.length?'disabled style="opacity:0.5;cursor:not-allowed"':''}><span>צור אריזה</span></button>
    ${S.pkgs.length>0?`
      <div class="sb-sub">אריזות (${S.pkgs.length})</div>
      ${S.pkgs.map((pkg,pi)=>{const col=C[pkg.ci]||C[0];return `
        <div style="display:flex;align-items:center;gap:6px;padding:8px 10px;margin-bottom:4px;border-radius:10px;background:${col.b};border:1.5px solid ${col.c}">
          <div style="display:flex;flex-direction:column;gap:1px">
            <span style="cursor:pointer;font-size:10px;color:${col.c};opacity:${pi>0?'.7':'.2'};line-height:1" onclick="${pi>0?`movePkg(${pi},-1)`:''}" title="הזז למעלה">▲</span>
            <span style="cursor:pointer;font-size:10px;color:${col.c};opacity:${pi<S.pkgs.length-1?'.7':'.2'};line-height:1" onclick="${pi<S.pkgs.length-1?`movePkg(${pi},1)`:''}" title="הזז למטה">▼</span>
          </div>

        </div>`;}).join('')}
      ${S.pkgs.length>1?`
        <div class="sb-sub">אריזת על / אריזת משנה</div>
        ${S.pkgs.map((pkg,pi)=>`
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;font-size:11px">
            <span>${pkg.emoji||''} ${pkg.name}</span><span style="color:${tcm()}">→</span>
            <select style="font-size:11px;border:1px solid ${brd()};border-radius:6px;padding:2px 4px;font-family:'Heebo';background:${bgc()};color:${tc()}" onchange="setPkgParent(${pi},this.value)">
              <option value="-1" ${!pkg.parentId?'selected':''}>עצמאית</option>
              ${S.pkgs.filter((_,i)=>i!==pi).map((p)=>{const idx=S.pkgs.indexOf(p);return `<option value="${idx}" ${pkg.parentId===p.id?'selected':''}>משנה של: ${p.emoji||''} ${p.name}</option>`}).join('')}

    <button class="sb-btn sb-btn-blue" style="margin-top:16px" onclick="S.step=3;R()"><span>המשך לארגון →</span></button>
  `;
}

function sCanv(){
  const cm=S.connMode;
  return `
    <div class="sb-title">ארגון וקישור</div>
    <div class="info-box" onclick="S.showCanvInfo=!S.showCanvInfo;R()">
      <b>למה ארגון?</b> ${S.showCanvInfo?'▲':'▼'}
      <div class="info-expand ${S.showCanvInfo?'open':''}">
        <div style="margin-top:6px">
        שלב הארגון הוא השלב שבו <b>הטקסט הופך למפה ויזואלית</b>. כל אריזה הופכת לקופסה על הלוח, ואתם יוצרים קשרים ביניהן.<br><br>
        <b>למה זה חשוב?</b><br>
        הצגה ויזואלית חושפת יחסים בין חלקי הטקסט שלא נראים בקריאה לינארית — הקבלות, ניגודים, סיבה ותוצאה, כלל ופרט.<br><br>
        <b>הנחיות:</b><br>

        • <b>לחץ על הנקודה</b> התחתונה ליצירת חץ בין חבילות<br>
        • הוסף <b>פתקים</b>, <b>תוויות</b> ו<b>צורות</b> לעיצוב המפה<br>
        • השתמש ב<b>סידור אוטומטי</b> לארגון מהיר
        </div>
      </div>
    </div>

// ===== WORD RENDERING =====
function wrd(w,vi,wi,mode){
  const k=`${vi}-${wi}`;
  const m=S.marks[k];
  const fs=mode==='canv'?14:S.fs;
  let st=`font-family:${fontCSS()};font-size:${fs}px;line-height:${S.lh};`;
  let cls='w';
  let oc='';
  if(m){
    const cat=getCatById(m.catId);
    if(cat){
      const fKey=m.catId+'__'+m.subId;
      if(S.vf==='all'||S.vf===m.catId||S.vf===fKey){
        const style=getStyleById(cat.styleId);
        ensureSubs(cat);
        const sub=cat.subs.find(s=>s.id===m.subId);
        const col=sub?C[sub.ci]:C[cat.ci];
        st+=style.apply(col);
      }
    }
  }
  if(mode==='disc') oc=`onclick="tglMark('${k}')"`;
  if(mode==='pkg'){
    if(S.pkgSel.includes(k)) st+=`box-shadow:0 0 0 2px ${cv('#FF8C69','#FF8C69')};border-radius:6px;padding:1px 3px;`;
    oc=`onclick="tglWordSel('${k}')"`;
  }
  const tip=getWordTip(w);
  const tipHtml=tip?`<span class="w-tip">${tip}</span>`:'';
  const searchCls=isSearchMatch(w)?' w-search-hl':'';
  return `<span class="${cls}${searchCls}" style="${st};position:relative" ${oc}>${w}${tipHtml}</span>`;
}

// ===== RENDER WITH LAYOUT — verse numbers as absolute, outside text flow =====
function renderWithLayout(contentFn){
  const lines=buildLines();
  let html=`<div class="text-area" style="position:relative;padding-right:48px">`;
  lines.forEach((line)=>{
    if(line.isPara){html+=`<div style="height:12px"></div>`;return;}
    const indent=S.indents[line.lineKey]||0;
    const indentPx=indent*40;
    const firstWord=line.words[0];
    let verseNum='';
    if(firstWord.wi===0){
      const v=D().verses[firstWord.vi];
      verseNum=`<span class="verse-n" style="right:-40px;top:4px">${v.n}</span>`;
    }
    html+=`<div class="imud-line" style="padding-right:${indentPx}px;font-size:${S.fs}px;line-height:${S.lh};position:relative">`;
    html+=verseNum;
    line.words.forEach(item=>{html+=contentFn(item.w,item.vi,item.wi)+' ';});
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

  const lines=buildLines();
  let html=`<div class="imud-toolbar">
    <div class="tb-btn" onclick="imudAction('break')" title="שבירת שורה (Enter)">↵ שבירת שורה</div>
    <div class="tb-btn" onclick="imudAction('para')" title="פסקה חדשה">¶ פסקה חדשה</div>
    <div class="tb-sep"></div>
    <div class="tb-btn" onclick="imudAction('indent')" title="הזחה ימינה (Tab)">→ הזחה</div>
    <div class="tb-btn" onclick="imudAction('outdent')" title="הזחה שמאלה (Shift+Tab)">← החזרה</div>
    <div class="tb-sep"></div>
    <div class="tb-btn" onclick="imudAction('removeBrk')" title="הסרת שבירה">✕ הסר שבירה</div>
    <div class="tb-sep"></div>
    <div class="tb-btn" onclick="doUndo()" title="ביטול (Ctrl+Z)" style="${undoStack.length?'':'opacity:.4;pointer-events:none'}">↩️ ביטול</div>
    <div class="tb-btn" onclick="doRedo()" title="שחזור (Ctrl+Y)" style="${redoStack.length?'':'opacity:.4;pointer-events:none'}">↪️ שחזור</div>
  </div>`;
  html+=`<div class="text-area" style="position:relative;padding-right:48px">`;
  lines.forEach((line)=>{
    if(line.isPara){
      html+=`<div class="para-break" onclick="delete S.paraBreaks[${line.afterVi}];R()" title="לחץ להסרת הפסקה" style="cursor:pointer"></div>`;
      return;
    }
    const indent=S.indents[line.lineKey]||0;
    const indentPx=indent*40;
    const firstWord=line.words[0];
    let verseNum='';
    if(firstWord.wi===0){
      const v=D().verses[firstWord.vi];
      verseNum=`<span class="verse-n" style="right:-40px;top:4px">${v.n}</span>`;
    }
    html+=`<div class="imud-line" style="padding-right:${indentPx}px;font-size:${S.fs}px;line-height:${S.lh};position:relative" data-linekey="${line.lineKey}">`;
    html+=verseNum;
    line.words.forEach((item)=>{
      const isSel=S.selWords.includes(item.k);

    });
    html+=`</div>`;
  });
  html+=`</div>`;
